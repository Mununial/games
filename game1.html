<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Chemical Lab - 3D Reactor</title>
    
    <!-- Matter.js for physics atoms -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #fb7185;
            --accent: #facc15;
            --reactor-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        /* Support for Global Theme Sync */
        [data-theme="light"] body {
            background: #f8fafc;
            color: #0f172a;
        }
        [data-theme="light"] .glass-card {
            background: rgba(255,255,255,0.8);
            border-color: rgba(0,0,0,0.1);
            color: #0f172a;
        }
        [data-theme="light"] .voice-box {
            background: rgba(255,255,255,0.9);
            border-color: rgba(0,0,0,0.1);
            color: #0f172a;
        }

        /* 3D Background */
        #bgCanvas {
            position: fixed; inset: 0;
            z-index: -1;
            opacity: 0.5;
        }

        #gameCanvas {
            display: block; width: 100vw; height: 100vh;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* UI HUD */
        .ui-layer {
            position: fixed; inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex; flex-direction: column;
            padding: 24px;
        }

        .top-hud {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 20px;
            pointer-events: all;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex; gap: 30px;
        }

        .stat { text-align: center; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.6rem; font-weight: 900; color: var(--primary); }

        .btn-home {
            width: 60px; height: 60px;
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; text-decoration: none;
            transition: 0.3s; pointer-events: all;
        }
        .btn-home:hover { background: #f43f5e; border-color: #f43f5e; transform: scale(1.1); }

        /* Voice Status Box */
        .voice-box {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px 40px;
            border-radius: 50px;
            display: flex; align-items: center; gap: 15px;
            width: 100%; max-width: 500px;
            z-index: 200;
        }

        .mic-dot {
            width: 12px; height: 12px;
            background: #fb7185; border-radius: 50%;
            box-shadow: 0 0 15px #fb7185;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

        #voiceTranscript { font-weight: 700; font-size: 1rem; color: #cbd5e1; }

        /* Feedback Text */
        #feedback {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 6rem; font-weight: 900;
            opacity: 0; pointer-events: none; z-index: 500;
            text-shadow: 0 0 30px rgba(251, 113, 133, 0.5);
        }

        /* Start Screen */
        #startScreen, #gameOverScreen {
            position: fixed; inset: 0; z-index: 2000;
            background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }

        .btn-primary {
            background: var(--primary); color: white;
            padding: 20px 50px; border-radius: 50px;
            font-weight: 900; border: none; font-size: 1.4rem;
            cursor: pointer; box-shadow: 0 10px 30px rgba(251, 113, 133, 0.4);
            margin-top: 30px;
        }
        .btn-primary:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(251, 113, 133, 0.5); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .glass-card { padding: 10px 15px; gap: 10px; }
            .stat-value { font-size: 1.1rem; }
            .voice-box { width: 90%; bottom: 20px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="top-hud">
            <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i></a>
            <div class="glass-card">
                <div class="stat">
                    <div class="stat-label">Lab Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Synthesis Time</div>
                    <div class="stat-value" id="timer">60</div>
                </div>
            </div>
            <div style="width: 60px;"></div>
        </div>

        <div id="feedback">SUCCESS!</div>

        <div class="voice-box">
            <div class="mic-dot"></div>
            <div id="voiceTranscript">AI LISTENING...</div>
        </div>
    </div>

    <div id="startScreen">
        <h1 style="font-size:4rem; font-weight:900; color:var(--primary);">SONIC CHEMICAL LAB</h1>
        <p style="max-width:550px; font-size:1.2rem; opacity:0.8; margin-top:20px;">
            The AI Master will ask for chemical combinations. 
            <span style="color:var(--accent)">Speak your answer loud and clear.</span> 
            Combine elements to synthesize points!
        </p>
        <button class="btn-primary" onclick="initGame()">INITIATE REACTOR</button>
    </div>

    <script>
        // --- 3JS BG ---
        function init3DBG() {
            const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 400;
            const group = new THREE.Group();
            const geo = new THREE.TorusGeometry(10, 3, 16, 100);
            for(let i=0; i<60; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: 0xfb7185, wireframe: true, transparent: true, opacity: 0.2 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                group.add(mesh);
            }
            scene.add(group);
            function anim() { requestAnimationFrame(anim); group.rotation.y += 0.001; renderer.render(scene, camera); }
            anim();
        }
        init3DBG();

        // --- Core Physics ---
        const Engine = Matter.Engine,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Body = Matter.Body;

        const engine = Engine.create();
        engine.world.gravity.y = 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const wallOpt = { isStatic: true, friction: 0, restitution: 1.0 };
        Composite.add(engine.world, [
            Bodies.rectangle(canvas.width/2, -50, canvas.width, 100, wallOpt),
            Bodies.rectangle(canvas.width/2, canvas.height+50, canvas.width, 100, wallOpt),
            Bodies.rectangle(-50, canvas.height/2, 100, canvas.height, wallOpt),
            Bodies.rectangle(canvas.width+50, canvas.height/2, 100, canvas.height, wallOpt)
        ]);

        let atoms = [];
        let score = 0;
        let active = false;
        let timeLeft = 60;
        let currentChallenge = null;

        const ELEMENTS = {
            'H': { color: '#94a3b8', name: 'Hydrogen' },
            'O': { color: '#60a5fa', name: 'Oxygen' },
            'Na': { color: '#fb923c', name: 'Sodium' },
            'Cl': { color: '#4ade80', name: 'Chlorine' },
            'C': { color: '#52525b', name: 'Carbon' }
        };

        const COMPOUNDS = [
            { req: ['H', 'O'], ans: ['water', 'h2o'], label: 'H₂O' },
            { req: ['Na', 'Cl'], ans: ['salt', 'sodium chloride', 'nacl'], label: 'NaCl' },
            { req: ['C', 'O'], ans: ['carbon monoxide', 'co'], label: 'CO' }
        ];

        function initGame() {
            document.getElementById('startScreen').style.display = 'none';
            active = true;
            spawnAtoms();
            askQuestion();
            startTimer();
            initSpeech();
            loop();
        }

        function spawnAtoms() {
            Object.keys(ELEMENTS).forEach(type => {
                for(let i=0; i<3; i++) {
                    const body = Bodies.circle(Math.random()*canvas.width, Math.random()*canvas.height, 40, { restitution: 1, frictionAir: 0.01 });
                    atoms.push({ body, type, ...ELEMENTS[type], bound: false });
                    Composite.add(engine.world, body);
                    Body.setVelocity(body, { x: (Math.random()-0.5)*5, y: (Math.random()-0.5)*5 });
                }
            });
        }

        function askQuestion() {
            currentChallenge = COMPOUNDS[Math.floor(Math.random()*COMPOUNDS.length)];
            const text = `What is the combination of ${ELEMENTS[currentChallenge.req[0]].name} and ${ELEMENTS[currentChallenge.req[1]].name}?`;
            speak(text);
            document.getElementById('voiceTranscript').innerText = `TARGET: ${currentChallenge.label} ?`;
        }

        function loop() {
            if(!active) return;
            Engine.update(engine);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            atoms.forEach(a => {
                const { x, y } = a.body.position;
                ctx.beginPath();
                ctx.arc(x, y, 40, 0, Math.PI*2);
                ctx.fillStyle = a.color;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 24px Outfit';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(a.type, x, y);
            });

            requestAnimationFrame(loop);
        }

        function handleSpeech(transcript) {
            if(!currentChallenge) return;
            const isMatch = currentChallenge.ans.some(a => transcript.includes(a));
            if(isMatch) {
                score += 500;
                document.getElementById('score').innerText = score;
                showFeedback("SYNTHESIZED!", "#fb7185");
                currentChallenge = null;
                setTimeout(askQuestion, 2000);
                syncPoints(500);
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(msg);
        }

        function initSpeech() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Recognition) return;
            const rec = new Recognition();
            rec.continuous = true;
            rec.onresult = (e) => {
                const transcript = e.results[e.results.length-1][0].transcript.toLowerCase();
                document.getElementById('voiceTranscript').innerText = `HEARD: "${transcript}"`;
                handleSpeech(transcript);
            };
            rec.start();
        }

        function startTimer() {
            const int = setInterval(() => {
                if(!active) { clearInterval(int); return; }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    active = false;
                    alert("Reactor Stable. Final Score: " + score);
                    location.reload();
                }
            }, 1000);
        }

        function showFeedback(txt, col) {
            const f = document.getElementById('feedback');
            f.innerText = txt; f.style.color = col;
            gsap.fromTo(f, { scale: 0, opacity: 0 }, { scale: 1.2, opacity: 1, duration: 0.5, yoyo: true, repeat: 1 });
        }

        function syncPoints(pts) {
            const uid = localStorage.getItem('qrio_active_id');
            if (uid) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, pointsToAdd: pts })
                }).catch(e => console.error(e));
            }
        }

        // --- Global Theme Sync ---
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('qrio-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });
    </script>
</body>
</html>
