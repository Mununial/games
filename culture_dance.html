<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance Studio - 3D Culture AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --primary: #f97316;
            --accent: #d946ef;
            --zen-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, #1e1b4b 0%, #000 100%);
            z-index: -1;
        }

        .orb {
            position: absolute; width: 40vw; height: 40vw;
            border-radius: 50%; filter: blur(100px);
            opacity: 0.2; animation: float 15s infinite alternate ease-in-out;
        }

        @keyframes float { from { transform: translate(0, 0); } to { transform: translate(100px, 50px); } }

        /* Camera Dashboard */
        #gameArea {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            height: 100vh;
            padding: 30px;
            gap: 20px;
        }

        .side-panel {
            display: flex; flex-direction: column; gap: 20px;
            z-index: 10;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--primary); }

        .center-video {
            position: relative;
            background: #000;
            border-radius: 40px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            box-shadow: 0 0 50px rgba(249, 115, 22, 0.2);
        }

        video { display: none; }
        canvas {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Pose Card */
        #poseDisplay {
            text-align: center;
            display: flex; flex-direction: column; gap: 15px;
        }

        .pose-icon {
            font-size: 5rem;
            background: rgba(255,255,255,0.05);
            width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 30px; margin: 0 auto;
            border: 1px solid var(--glass-border);
            color: var(--primary);
        }

        /* Success Alert */
        #feedback {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 5rem; font-weight: 900;
            color: #10b981; pointer-events: none; z-index: 1000;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.5);
        }

        .btn-exit {
            position: fixed; top: 30px; right: 30px;
            width: 50px; height: 50px; background: var(--glass);
            border: 1px solid var(--glass-border); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: 0.3s; z-index: 100;
        }
        .btn-exit:hover { background: #ef4444; transform: scale(1.1); }

        @media (max-width: 1024px) {
            #gameArea { grid-template-columns: 1fr; grid-template-rows: auto 1fr auto; padding: 15px; }
            .side-panel { flex-direction: row; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb" style="top: -10%; left: -10%; background: var(--primary);"></div>
        <div class="orb" style="bottom: -10%; right: -10%; background: var(--accent);"></div>
    </div>

    <a href="game10.html" class="btn-exit"><i class="fa-solid fa-xmark"></i></a>

    <div id="feedback">PERFECT!</div>

    <div id="gameArea">
        <!-- Stats Left -->
        <div class="side-panel">
            <div class="glass-card">
                <div class="stat-label">Performance</div>
                <div class="stat-value" id="score">0</div>
                <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">ZEN POINTS</div>
            </div>
            
            <div class="glass-card">
                <div class="stat-label">Session Timer</div>
                <div class="stat-value" id="timer">02:00</div>
            </div>
        </div>

        <!-- Video Center -->
        <div class="center-video">
            <video id="video" playsinline></video>
            <canvas id="canvas"></canvas>
            
            <div style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; text-align: center;">
                <div class="glass-card" style="padding: 10px 20px; border-radius: 20px;">
                    <span id="instruction" style="font-weight: 700; color: #cbd5e1;">Align your body to start the performance</span>
                </div>
            </div>
        </div>

        <!-- Target Right -->
        <div class="side-panel">
            <div class="glass-card" id="poseDisplay">
                <div class="stat-label">Target Mudra</div>
                <div class="pose-icon" id="targetIcon">🙏</div>
                <h2 id="targetName" style="font-weight: 900; color: #fff; margin: 0;">ANJALI</h2>
                <p id="targetHint" style="font-size: 0.85rem; opacity: 0.6;">Hands together at chest level.</p>
            </div>

            <div class="glass-card" style="margin-top: auto;">
                <div class="stat-label">AI SYNC</div>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                    <div id="syncDot" style="width: 10px; height: 10px; background: #fb7185; border-radius: 50%;"></div>
                    <span id="syncStatus" style="font-size: 0.8rem; font-weight: 800;">CALIBRATING...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');
        let score = 0;
        let gameActive = true;
        let timeLeft = 120;

        const POSES = [
            { name: "ANJALI", icon: "🙏", hint: "Hands together at chest.", logic: "anjali" },
            { name: "ARAMANDI", icon: "🩰", hint: "Arms wide, knees bent.", logic: "wide" },
            { name: "PATHAKA", icon: "✋", hint: "One hand up, palm forward.", logic: "top" }
        ];
        let currentIdx = 0;

        function updateTarget() {
            currentIdx = (currentIdx + 1) % POSES.length;
            const p = POSES[currentIdx];
            document.getElementById('targetName').innerText = p.name;
            document.getElementById('targetIcon').innerText = p.icon;
            document.getElementById('targetHint').innerText = p.hint;
            gsap.from("#poseDisplay", { scale: 0.8, opacity: 0, duration: 0.5, ease: "back.out" });
        }

        async function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.poseLandmarks) {
                document.getElementById('syncStatus').innerText = "LIVE SYNC";
                document.getElementById('syncDot').style.background = "#10b981";
                
                drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS, { color: '#f97316', lineWidth: 4 });
                drawLandmarks(canvasCtx, results.poseLandmarks, { color: '#ffffff', lineWidth: 2 });

                // Simple check
                const lm = results.poseLandmarks;
                let match = false;
                
                if (POSES[currentIdx].logic === "anjali") {
                    const dist = Math.abs(lm[15].x - lm[16].x);
                    if (dist < 0.1 && lm[15].visibility > 0.5) match = true;
                } else if (POSES[currentIdx].logic === "wide") {
                    const dist = Math.abs(lm[15].x - lm[16].x);
                    if (dist > 0.6) match = true;
                } else {
                    if (lm[15].y < lm[11].y || lm[16].y < lm[12].y) match = true;
                }

                if (match) {
                    success();
                }
            }
            canvasCtx.restore();
        }

        function success() {
            if(!gameActive) return;
            score += 500;
            document.getElementById('score').innerText = score;
            const f = document.getElementById('feedback');
            gsap.fromTo(f, { scale: 0, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, yoyo: true, repeat: 1 });
            gameActive = false; // Cooldown
            syncPoints(500);
            setTimeout(() => { gameActive = true; updateTarget(); }, 3000);
        }

        function syncPoints(pts) {
            const uid = localStorage.getItem('qrio_active_id');
            if(uid) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, pointsToAdd: pts })
                }).catch(e => console.error(e));
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        pose.onResults(onResults);

        // Simple webcam setup
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } }).then(stream => {
            videoElement.srcObject = stream;
            videoElement.play();
            const process = async () => {
                await pose.send({ image: videoElement });
                requestAnimationFrame(process);
            };
            process();
        });

        // Timer
        setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }
        }, 1000);

        // Adjust canvas
        window.addEventListener('resize', () => {
            canvasElement.width = canvasElement.offsetWidth;
            canvasElement.height = canvasElement.offsetHeight;
        });
        window.dispatchEvent(new Event('resize'));
    </script>
</body>
</html>
