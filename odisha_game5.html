<!DOCTYPE html>
<html lang="or">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - BSE Odisha</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #f59e0b; /* Amber */
            --accent: #6366f1;  /* Indigo */
            --bg-base: #f8fafc;
            --pastel-amber: #fffbeb;
            --pastel-blue: #e0f2fe;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sketch-border: 2px solid #334155;
            --soft-shadow: 6px 6px 0px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: linear-gradient(135deg, var(--pastel-amber) 0%, var(--pastel-blue) 100%);
            color: var(--text-main);
            font-family: 'Outfit', 'Mukta Malar', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Doodle Pattern Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10 Q 30 5, 40 20 T 70 10' fill='none' stroke='%23334155' stroke-width='2'/%3E%3Cpath d='M80 30 L 100 50 M 100 30 L 80 50' stroke='%23334155' stroke-width='2'/%3E%3Ccircle cx='50' cy='100' r='5' fill='none' stroke='%23334155' stroke-width='2'/%3E%3C/svg%3E");
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            color: var(--text-main);
            text-shadow: 2px 2px 0 white;
            text-align: center;
        }

        p {
            margin: 0 0 30px 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            grid-template-rows: repeat(2, 120px);
            gap: 15px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px 22px 28px 20px;
            border: var(--sketch-border);
            box-shadow: var(--soft-shadow);
            backdrop-filter: blur(20px);
        }

        .card {
            width: 120px;
            height: 120px;
            cursor: pointer;
            position: relative;
            perspective: 1000px;
            transition: var(--transition);
        }

        .card:hover { transform: scale(1.05); }

        .card-inner {
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: var(--sketch-border);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
        }

        .card-front {
            background: var(--primary);
            color: white;
            font-size: 3rem;
        }

        .card-front::after { content: '?'; font-weight: 900; }

        .card-back {
            background: white;
            color: var(--text-main);
            transform: rotateY(180deg);
            font-weight: 900;
        }

        .card.matched {
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.3s, opacity 0.3s linear;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: var(--sketch-border);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            transition: var(--transition);
            box-shadow: 6px 6px 0px #334155;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05) rotate(1deg);
            background: var(--accent);
        }

        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(254, 252, 232, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 40px;
        }

        .win-overlay h2 {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-main);
            margin: 0;
            text-shadow: 3px 3px 0 white;
        }

        .btn-exit {
            position: absolute;
            top: 24px;
            right: 24px;
            background: white;
            border: var(--sketch-border);
            color: var(--primary);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 4px 4px 0px #334155;
        }

        .btn-exit:hover {
            transform: scale(1.05) rotate(-2deg);
            background: #ef4444;
            color: white;
        }

    </style>
</head>

<body>

    <button class="btn-exit" onclick="window.close()">ବନ୍ଦ କରନ୍ତୁ (Exit)</button>

    <h1>ଶବ୍ଦ ଏବଂ ଚିତ୍ର (Words & Pictures)</h1>
    <p>Flip the cards to match the Odia word with its picture.</p>

    <div class="game-grid" id="grid">
        <!-- Populated via JS -->
    </div>

    <div class="win-overlay" id="winScreen">
        <h2>ସଫଳତା! (Success!)</h2>
        <p style="color:#b45309; font-size:1.5rem;">ଆପଣ ସବୁଗୁଡ଼ିକୁ ମିଳାଇ ଦେଇଛନ୍ତି! (Memory Master!)</p>
        <p style="color: #4ade80; font-size: 2rem;">+50 Points Earned!</p>
        <button class="btn" onclick="window.close()">ଫେରିଯାଆନ୍ତୁ (Return)</button>
    </div>

    <script>
        const items = [
            { id: 1, val: "ସୂର୍ଯ୍ୟ", type: "word" }, { id: 1, val: "☀️", type: "icon" },
            { id: 2, val: "ଗଛ", type: "word" }, { id: 2, val: "🌳", type: "icon" },
            { id: 3, val: "ଫୁଲ", type: "word" }, { id: 3, val: "🌸", type: "icon" },
            { id: 4, val: "ପକ୍ଷୀ", type: "word" }, { id: 4, val: "🐦", type: "icon" }
        ];

        let cards = [...items].sort(() => Math.random() - 0.5);
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matches = 0;

        function render() {
            const grid = document.getElementById('grid');
            cards.forEach((data, index) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.dataset.id = data.id;

                // if it's a word, scale down font slightly
                const fontSize = data.type === 'word' ? '1.5rem' : '3rem';

                el.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back" style="font-size: ${fontSize}">${data.val}</div>
                    </div>
                `;

                el.addEventListener('click', () => flipCard(el));
                grid.appendChild(el);
            });
        }

        function flipCard(el) {
            if (lockBoard) return;
            if (el === firstCard) return;

            el.classList.add('flipped');

            if (!firstCard) {
                firstCard = el;
                return;
            }

            secondCard = el;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            let f = firstCard; let s = secondCard;
            setTimeout(() => {
                f.classList.add('matched');
                s.classList.add('matched');
            }, 600);

            resetBoard();

            matches++;
            if (matches === 4) {
                setTimeout(() => {
                    document.getElementById('winScreen').style.display = 'flex';
                    awardPoints();
                }, 1000);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        function awardPoints() {
            let activeId = localStorage.getItem('qrio_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: 50 })
                }).catch(console.error);
            }
        }

        render();
    </script>
</body>

</html>
