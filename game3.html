<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlobeTrotter Quest - 3D Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --pop-blue: #3b82f6;
            --pop-blue-dark: #1d4ed8;
            --pop-pink: #ec4899;
            --pop-pink-dark: #be185d;
            --pop-yellow: #f59e0b;
            --pop-yellow-dark: #b45309;
            --pop-purple: #8b5cf6;
            --pop-purple-dark: #6d28d9;
            --pop-green: #10b981;
            --pop-green-dark: #047857;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --text-light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-light);
            perspective: 1200px;
        }

        /* Ambient glowing orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: floatOrb 15s infinite ease-in-out alternate;
        }
        .orb-1 { top: -10%; left: -10%; width: 60vw; height: 60vw; background: var(--pop-purple); }
        .orb-2 { bottom: -10%; right: -10%; width: 50vw; height: 50vw; background: var(--pop-blue); animation-delay: -7s; }
        .orb-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: var(--pop-pink); animation-delay: -4s; opacity: 0.3; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 60px) scale(1.1); }
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
            overflow-y: auto;
            z-index: 5;
        }

        .screen.active {
            display: flex;
        }

        /* --- 3D Glass HUD --- */
        .top-hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 100;
            width: auto;
            max-width: 95%;
        }

        .hud-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .hud-panel:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }

        .btn-exit-global {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 1000;
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0px #7f1d1d, 0 10px 15px rgba(0,0,0,0.3);
            transition: all 0.1s;
        }

        .btn-exit-global:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #7f1d1d, 0 5px 5px rgba(0,0,0,0.3);
        }

        /* --- 3D Buttons --- */
        .btn-3d {
            background: linear-gradient(135deg, var(--pop-blue), var(--pop-blue-dark));
            color: white;
            padding: 16px 32px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.2rem;
            border: 3px solid rgba(255,255,255,0.3);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 0px var(--pop-blue-dark), 0 15px 25px rgba(0,0,0,0.4);
            transition: all 0.1s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-3d:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0px var(--pop-blue-dark), 0 5px 10px rgba(0,0,0,0.4);
        }

        .btn-pink { background: linear-gradient(135deg, var(--pop-pink), var(--pop-pink-dark)); box-shadow: 0 8px 0px var(--pop-pink-dark), 0 15px 25px rgba(0,0,0,0.4); }
        .btn-pink:active { box-shadow: 0 2px 0px var(--pop-pink-dark); }

        .btn-green { background: linear-gradient(135deg, var(--pop-green), var(--pop-green-dark)); box-shadow: 0 8px 0px var(--pop-green-dark), 0 15px 25px rgba(0,0,0,0.4); }
        .btn-green:active { box-shadow: 0 2px 0px var(--pop-green-dark); }

        /* --- Cards --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 2px 0 rgba(255,255,255,0.2);
            text-align: center;
            position: relative;
            transform-style: preserve-3d;
        }

        .logo-title {
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin-bottom: 1.5rem;
            color: #fff;
            font-weight: 900;
            text-shadow: 3px 3px 0 var(--pop-blue), 6px 6px 0px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        /* --- Avatar Select --- */
        .avatar-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .avatar-select {
            font-size: 2.5rem;
            width: 80px; height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .avatar-select:hover { transform: translateY(-5px) scale(1.1); background: rgba(255,255,255,0.2); }

        .avatar-select.selected {
            background: linear-gradient(135deg, var(--pop-yellow), var(--pop-yellow-dark));
            border-color: white;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.4);
            transform: scale(1.15) rotate(5deg);
        }

        .name-input {
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.9);
            border: 4px solid white;
            border-radius: 20px;
            color: var(--bg-grad-1);
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            outline: none;
            box-shadow: 0 10px 0px rgba(0,0,0,0.2);
        }

        /* --- Map Styling --- */
        .world-map-svg {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
        }

        .continent {
            cursor: pointer;
            transition: all 0.3s;
            stroke-width: 3;
            stroke: rgba(255,255,255,0.5);
        }

        .continent:hover:not(.locked) {
            filter: brightness(1.2);
            transform: translateY(-10px) scale(1.02);
        }

        .continent.locked {
            fill: #475569 !important;
            opacity: 0.6;
            pointer-events: none;
        }

        .cont-text {
            font-weight: 900;
            font-size: 18px;
            fill: #fff;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* --- Level Grid --- */
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            margin-top: 20px;
        }

        .level-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 30px;
            transition: all 0.3s;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            position: relative;
        }

        .level-card.unlocked:hover {
            transform: translateY(-10px) rotateX(10deg);
            background: rgba(255,255,255,0.15);
            border-color: var(--pop-blue);
        }

        .level-card h2 { margin: 0 0 15px; font-size: 1.8rem; font-weight: 900; color: #fff; }

        .stars-display {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--pop-yellow);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }

        /* --- Game UI --- */
        .game-header {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .timer-circle {
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 4px solid var(--pop-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.3);
        }

        .game-board {
            width: 100%;
            max-width: 800px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .opt-btn {
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px;
            font-size: 3rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 0px rgba(0,0,0,0.2);
        }

        .opt-btn.text-opt { font-size: 1.2rem; font-weight: 900; color: white; }

        .opt-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-5px); }

        .opt-btn.correct { background: var(--pop-green) !important; border-color: white !important; box-shadow: 0 0 30px var(--pop-green); color: white; }
        .opt-btn.wrong { background: var(--pop-pink) !important; border-color: white !important; box-shadow: 0 0 30px var(--pop-pink); color: white; }

        /* --- Results Overlay --- */
        .result-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        /* --- Drag Drop --- */
        .match-area {
            display: flex;
            justify-content: space-around;
            gap: 30px;
            margin-top: 20px;
        }
        .drag-col, .drop-col { display: flex; flex-direction: column; gap: 15px; flex: 1; }
        .drag-item, .drop-zone {
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            font-weight: 800;
            border: 2px dashed rgba(255,255,255,0.3);
            cursor: grab;
            transition: transform 0.1s;
        }
        .drop-zone { cursor: default; border-style: solid; background: rgba(0,0,0,0.2); min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .matched { background: var(--pop-green) !important; color: white; border-color: white; }

        @media (max-width: 768px) {
            .top-hud { top: 75px; flex-wrap: wrap; justify-content: center; gap: 8px; }
            .hud-panel { padding: 6px 12px; font-size: 0.8rem; }
            .screen { padding-top: 150px; }
            .grid-4 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .opt-btn { font-size: 2rem; padding: 15px; }
            .logo-title { font-size: 2.2rem; }
            .game-board { padding: 20px; }
            .country-grid { grid-template-columns: 1fr; }
        }

        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3000;
        }
    </style>
</head>

<body>
    <!-- Ambient BG -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- HUD -->
    <div class="top-hud" id="hud" style="display: none;">
        <div class="hud-panel" onclick="showScreen('profile-screen')">
            <span id="hud-avatar">✈️</span> <span id="hud-name">Player</span>
        </div>
        <div class="hud-panel" onclick="showScreen('world-map')" style="background: var(--pop-blue); border-color: white;">
            <i class="fa-solid fa-earth-americas"></i> Map
        </div>
        <div class="hud-panel">
            <span style="color: var(--pop-yellow)">⭐</span> <span id="hud-miles">0</span> Miles
        </div>
    </div>

    <button class="btn-exit-global" onclick="window.close()" title="Exit Game">
        <i class="fa-solid fa-xmark"></i>
    </button>

    <!-- 1. LOGIN SCREEN -->
    <div class="screen active" id="login-screen">
        <div class="glass-card" id="loginCard">
            <div style="font-size: 5rem; margin-bottom: 10px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));">🌍</div>
            <h1 class="logo-title">GlobeTrotter</h1>
            <p style="font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 2px;">Choose Your Avatar</p>
            <div class="avatar-box">
                <div class="avatar-select selected" onclick="selectAvatar(this, '🤠')">🤠</div>
                <div class="avatar-select" onclick="selectAvatar(this, '👩‍🚀')">👩‍🚀</div>
                <div class="avatar-select" onclick="selectAvatar(this, '🕵️')">🕵️</div>
                <div class="avatar-select" onclick="selectAvatar(this, '🥷')">🥷</div>
            </div>
            <input type="text" class="name-input" id="player-name" placeholder="EXPLORER NAME..." maxlength="15">
            <button class="btn-3d btn-green" style="width: 100%;" onclick="login()">Start Adventure!</button>
        </div>
    </div>

    <!-- 2. WORLD MAP SCREEN -->
    <div class="screen" id="world-map">
        <h1 class="logo-title" style="margin-top: 2rem;">Select Continent</h1>
        <svg class="world-map-svg" viewBox="0 0 1000 500">
            <g id="cont_na" class="continent" fill="#f87171" onclick="selectContinent('na')">
                <path d="M 150 50 L 350 50 Q 400 150 300 300 L 150 250 Z" />
                <text x="210" y="150" class="cont-text">N. America</text>
            </g>
            <g id="cont_sa" class="continent locked" fill="#fbbf24" onclick="selectContinent('sa')">
                <path d="M 280 320 L 400 320 L 350 480 L 250 400 Z" />
                <text x="290" y="415" class="cont-text">S. America</text>
            </g>
            <g id="cont_eu" class="continent locked" fill="#60a5fa" onclick="selectContinent('eu')">
                <path d="M 450 50 L 600 50 L 650 150 L 400 150 Z" />
                <text x="480" y="110" class="cont-text">Europe</text>
            </g>
            <g id="cont_af" class="continent locked" fill="#4ade80" onclick="selectContinent('af')">
                <path d="M 420 180 L 620 180 L 580 380 L 400 300 Z" />
                <text x="480" y="280" class="cont-text">Africa</text>
            </g>
            <g id="cont_as" class="continent locked" fill="#c084fc" onclick="selectContinent('as')">
                <path d="M 620 50 L 900 50 L 850 250 L 550 250 Z" />
                <text x="700" y="150" class="cont-text">Asia</text>
            </g>
            <g id="cont_oc" class="continent locked" fill="#f472b6" onclick="selectContinent('oc')">
                <path d="M 750 300 L 950 300 L 900 450 L 700 400 Z" />
                <text x="800" y="380" class="cont-text">Oceania</text>
            </g>
        </svg>

        <div style="width: 100%; max-width: 400px; margin-top: 30px;">
            <div style="height: 15px; background: rgba(255,255,255,0.1); border-radius: 50px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);">
                <div id="map-prog-fill" style="height: 100%; background: var(--pop-blue); width: 0%; transition: width 1s;"></div>
            </div>
            <p style="text-align: center; font-weight: 900; margin-top: 10px;">World Completion: <span id="map-prog-text">0%</span></p>
        </div>
    </div>

    <!-- 3. COUNTRY SCREEN (LEVELS) -->
    <div class="screen" id="country-screen">
        <h1 id="cont-title" class="logo-title">Continent</h1>
        <div class="country-grid" id="country-grid">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- 4. GAME SCREEN -->
    <div class="screen" id="game-screen">
        <div class="game-header" id="game-country-title">Country Name</div>
        <div class="timer-circle" id="game-timer">30</div>
        <div class="game-board" id="game-board">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- 5. PROFILE SCREEN -->
    <div class="screen" id="profile-screen">
        <div class="glass-card" style="max-width: 600px;">
            <div style="font-size: 6rem; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.5));" id="prof-avatar">🤠</div>
            <h1 id="prof-name" class="logo-title" style="margin: 10px 0;">Player</h1>
            <div style="background: var(--pop-blue); padding: 8px 25px; border-radius: 50px; display: inline-block; font-weight: 900; margin-bottom: 20px;" id="prof-rank">Tourist</div>
            <p style="font-size: 1.5rem; font-weight: 900;">Miles Traveled: <span id="prof-miles" style="color: var(--pop-yellow);">0</span> ✈️</p>

            <div style="text-align: left; margin-top: 30px;">
                <h3 style="border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;">Passport Stamps</h3>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;" id="badges">
                    <div style="opacity: 0.3; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: center;" id="badge-first">🛫</div>
                    <div style="opacity: 0.3; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: center;" id="badge-master">🌟</div>
                    <div style="opacity: 0.3; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; text-align: center;" id="badge-world">🌍</div>
                </div>
            </div>

            <button class="btn-3d btn-pink" style="margin-top: 30px; width: 100%;" onclick="showScreen('world-map')">Back to Explorer</button>
        </div>
    </div>

    <!-- RESULT OVERLAY -->
    <div class="result-overlay" id="result-overlay">
        <canvas id="confetti-canvas"></canvas>
        <div class="glass-card">
            <h1 id="result-title" style="font-size: 3rem;">Clear!</h1>
            <div id="result-stars" style="font-size: 3rem; margin: 20px 0;">★ ★ ★</div>
            <p style="font-size: 1.8rem; font-weight: 900;">+ <span id="result-miles">0</span> Miles</p>
            <button class="btn-3d btn-green" style="margin-top: 25px; width: 100%;" onclick="closeResultAndBackToMap()">Continue Trip</button>
        </div>
    </div>

    <script>
        // --- Game Data ---
        const GAME_TYPES = { FLAG: 'FLAG_FRENZY', CAPITAL: 'CAPITAL_DASH', MONUMENT: 'MONUMENT_MATCH', MAP: 'MAP_TAP' };

        const worldData = {
            na: {
                id: 'na', name: 'N. America', unlockReq: 0,
                countries: [
                    { id: 'na_usa', name: 'USA', type: GAME_TYPES.FLAG, q: 'Find USA Flag', opts: ['🇺🇸', '🇬🇧', '🇱🇷', '🇲🇾'], ans: '🇺🇸' },
                    { id: 'na_can', name: 'Canada', type: GAME_TYPES.CAPITAL, q: 'Capital of Canada?', opts: ['Toronto', 'Vancouver', 'Ottawa', 'Montreal'], ans: 'Ottawa' },
                    { id: 'na_mex', name: 'Mexico', type: GAME_TYPES.MONUMENT, monuments: ['Chichen Itza', 'Statue of Liberty', 'CN Tower'], c_opts: ['Mexico', 'USA', 'Canada'], matches: { 'Chichen Itza': 'Mexico', 'Statue of Liberty': 'USA', 'CN Tower': 'Canada' } }
                ]
            },
            sa: {
                id: 'sa', name: 'S. America', unlockReq: 3,
                countries: [
                    { id: 'sa_bra', name: 'Brazil', type: GAME_TYPES.FLAG, q: 'Which is Brazil?', opts: ['🇧🇷', '🇦🇷', '🇨🇴', '🇵🇪'], ans: '🇧🇷' },
                    { id: 'sa_arg', name: 'Argentina', type: GAME_TYPES.MAP, q: 'Tap on Argentina!', tgt: 'arg_path', svg: '<svg viewBox="0 0 200 300" style="max-height: 250px;"><path id="bra_path" class="tap-region" fill="#4ade80" d="M 50 20 L 180 20 L 150 150 L 50 100 Z" /><path id="arg_path" class="tap-region" fill="#38bdf8" d="M 50 100 L 150 150 L 100 280 L 40 280 Z" /><text x="100" y="75" fill="white" font-weight="900">🇧🇷</text></svg>' }
                ]
            },
            eu: {
                id: 'eu', name: 'Europe', unlockReq: 5,
                countries: [
                    { id: 'eu_fra', name: 'France', type: GAME_TYPES.MONUMENT, monuments: ['Eiffel Tower', 'Colosseum', 'Big Ben'], c_opts: ['France', 'Italy', 'UK'], matches: { 'Eiffel Tower': 'France', 'Colosseum': 'Italy', 'Big Ben': 'UK' } },
                    { id: 'eu_ita', name: 'Italy', type: GAME_TYPES.CAPITAL, q: 'Capital of Italy?', opts: ['Milan', 'Rome', 'Venice', 'Naples'], ans: 'Rome' },
                    { id: 'eu_ger', name: 'Germany', type: GAME_TYPES.FLAG, q: 'Find Germany!', opts: ['🇧🇪', '🇩🇪', '🇦🇹', '🇳🇱'], ans: '🇩🇪' }
                ]
            },
            af: {
                id: 'af', name: 'Africa', unlockReq: 8,
                countries: [
                    { id: 'af_egy', name: 'Egypt', type: GAME_TYPES.MONUMENT, monuments: ['Pyramids', 'Table Mountain', 'Kilimanjaro'], c_opts: ['Egypt', 'S. Africa', 'Tanzania'], matches: { 'Pyramids': 'Egypt', 'Table Mountain': 'S. Africa', 'Kilimanjaro': 'Tanzania' } }
                ]
            },
            as: {
                id: 'as', name: 'Asia', unlockReq: 9,
                countries: [
                    { id: 'as_jpn', name: 'Japan', type: GAME_TYPES.FLAG, q: 'Find Japan!', opts: ['🇰🇷', '🇯🇵', '🇨🇳', '🇧🇩'], ans: '🇯🇵' },
                    { id: 'as_ind', name: 'India', type: GAME_TYPES.CAPITAL, q: 'Capital of India?', opts: ['Mumbai', 'Kolkata', 'New Delhi', 'Chennai'], ans: 'New Delhi' }
                ]
            },
            oc: {
                id: 'oc', name: 'Oceania', unlockReq: 11,
                countries: [
                    { id: 'oc_aus', name: 'Australia', type: GAME_TYPES.CAPITAL, q: 'Capital of Australia?', opts: ['Sydney', 'Melbourne', 'Canberra', 'Brisbane'], ans: 'Canberra' }
                ]
            }
        };

        const TOTAL_COUNTRIES = 12; // Adjusted total count

        let player = { name: '', avatar: '🤠', miles: 0, completed: {}, badges: [] };
        let currentContinent = null;
        let gameActive = false;
        let tLeft = 30;
        let timerInt = null;

        // --- Audio Context ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(freq, type, dur, vol = 0.1) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        // --- Core Functions ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');
            
            gsap.from(target, { opacity: 0, y: 50, duration: 0.5 });
            
            if (id !== 'login-screen') document.getElementById('hud').style.display = 'flex';
            if (id === 'world-map') updateWorldMap();
            if (id === 'profile-screen') updateProfile();
            playTone(400, 'sine', 0.1);
        }

        let selectedAvatar = '🤠';
        function selectAvatar(el, icon) {
            document.querySelectorAll('.avatar-select').forEach(a => a.classList.remove('selected'));
            el.classList.add('selected');
            selectedAvatar = icon;
            playTone(500, 'sine', 0.05);
        }

        function login() {
            initAudio();
            let name = document.getElementById('player-name').value.trim();
            player.name = name || "Explorer";
            player.avatar = selectedAvatar;
            updateHud();
            showScreen('world-map');
        }

        function updateHud() {
            document.getElementById('hud-avatar').innerText = player.avatar;
            document.getElementById('hud-name').innerText = player.name;
            document.getElementById('hud-miles').innerText = player.miles;
        }

        function updateWorldMap() {
            let clears = Object.keys(player.completed).length;
            let percent = Math.round((clears / TOTAL_COUNTRIES) * 100);
            document.getElementById('map-prog-fill').style.width = percent + '%';
            document.getElementById('map-prog-text').innerText = percent + '%';

            Object.keys(worldData).forEach(contId => {
                let contEl = document.getElementById(`cont_${contId}`);
                if (clears >= worldData[contId].unlockReq) {
                    contEl.classList.remove('locked');
                }
            });
        }

        function selectContinent(id) {
            let clears = Object.keys(player.completed).length;
            if (clears < worldData[id].unlockReq) {
                playTone(200, 'sawtooth', 0.3);
                return;
            }
            currentContinent = worldData[id];
            document.getElementById('cont-title').innerText = currentContinent.name;
            
            let grid = document.getElementById('country-grid');
            grid.innerHTML = '';

            let prvCleared = true;
            currentContinent.countries.forEach((country) => {
                let stars = player.completed[country.id] || 0;
                let isUnlocked = prvCleared;
                let card = document.createElement('div');
                card.className = `level-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                let sHtml = (stars === 3) ? '★ ★ ★' : (stars === 2) ? '★ ★ ☆' : (stars === 1) ? '★ ☆ ☆' : '☆ ☆ ☆';
                
                card.innerHTML = `
                    <h2>${country.name}</h2>
                    <div class="stars-display">${sHtml}</div>
                    <button class="btn-3d" style="width:100%" onclick="playLevel('${country.id}')" ${!isUnlocked ? 'disabled' : ''}>
                        ${isUnlocked ? 'Fly Now' : 'Locked'}
                    </button>
                    ${!isUnlocked ? '<i class="fa-solid fa-lock" style="position:absolute; top:20px; right:20px; opacity:0.5"></i>' : ''}
                `;
                grid.appendChild(card);
                if (stars === 0) prvCleared = false;
            });
            showScreen('country-screen');
        }

        function playLevel(countryId) {
            let currentLevel = currentContinent.countries.find(c => c.id === countryId);
            document.getElementById('game-country-title').innerText = currentLevel.name;
            showScreen('game-screen');
            
            let board = document.getElementById('game-board');
            board.innerHTML = '';
            tLeft = 30;
            document.getElementById('game-timer').innerText = tLeft;
            
            gameActive = true;
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if (!gameActive) return;
                tLeft--;
                document.getElementById('game-timer').innerText = tLeft;
                if (tLeft <= 5) playTone(800, 'sine', 0.05, 0.03);
                if (tLeft <= 0) endLevel(false);
            }, 1000);

            if (currentLevel.type === GAME_TYPES.FLAG || currentLevel.type === GAME_TYPES.CAPITAL) {
                board.innerHTML = `<h3 style="margin-bottom:20px">${currentLevel.q}</h3><div class="grid-4" id="opts"></div>`;
                let opts = [...currentLevel.opts].sort(() => Math.random() - 0.5);
                opts.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = `opt-btn ${currentLevel.type === GAME_TYPES.CAPITAL ? 'text-opt' : ''}`;
                    btn.innerText = opt;
                    btn.onclick = () => {
                        if (opt === currentLevel.ans) {
                            btn.classList.add('correct');
                            playTone(600, 'sine', 0.2);
                            setTimeout(() => endLevel(true), 800);
                        } else {
                            btn.classList.add('wrong');
                            playTone(200, 'sawtooth', 0.2);
                        }
                    };
                    document.getElementById('opts').appendChild(btn);
                });
            } else if (currentLevel.type === GAME_TYPES.MONUMENT) {
                board.innerHTML = `
                    <h3 style="margin-bottom:15px">Match Monuments to Countries!</h3>
                    <p style="font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px;">Click a Monument, then click its Country!</p>
                    <div class="match-area">
                        <div class="drag-col" id="monument-list"></div>
                        <div class="drop-col" id="country-list"></div>
                    </div>`;

                let selectedMonument = null;
                let selectedDiv = null;

                let mons = [...currentLevel.monuments].sort(() => Math.random() - 0.5);
                let counts = [...currentLevel.c_opts].sort(() => Math.random() - 0.5);

                mons.forEach(m => {
                    let div = document.createElement('div');
                    div.className = 'drag-item';
                    div.style.cursor = 'pointer';
                    div.innerText = m;
                    div.onclick = () => {
                        if (div.classList.contains('matched')) return;
                        document.querySelectorAll('.drag-item').forEach(d => {
                            d.style.borderColor = 'rgba(255,255,255,0.1)';
                            d.style.background = 'rgba(255,255,255,0.1)';
                        });
                        selectedMonument = m;
                        selectedDiv = div;
                        div.style.borderColor = 'var(--pop-blue)';
                        div.style.background = 'rgba(59, 130, 246, 0.2)';
                        playTone(500, 'sine', 0.05);
                    };
                    document.getElementById('monument-list').appendChild(div);
                });

                counts.forEach(c => {
                    let div = document.createElement('div');
                    div.className = 'drop-zone';
                    div.style.cursor = 'pointer';
                    div.innerText = c;
                    div.onclick = () => {
                        if (div.classList.contains('matched') || !selectedMonument) return;
                        if (currentLevel.matches[selectedMonument] === c) {
                            div.classList.add('matched');
                            selectedDiv.classList.add('matched');
                            div.innerHTML = `${c} <br><small style="font-size:0.7em">✓ ${selectedMonument}</small>`;
                            selectedDiv.style.opacity = '0.5';
                            selectedDiv.style.pointerEvents = 'none';
                            playTone(600, 'sine', 0.1);
                            selectedMonument = null; selectedDiv = null;
                            if (document.querySelectorAll('.drop-zone.matched').length === currentLevel.monuments.length) {
                                setTimeout(() => endLevel(true), 800);
                            }
                        } else {
                            playTone(200, 'sawtooth', 0.2);
                            div.style.borderColor = 'var(--pop-pink)';
                            gsap.to(div, { x: 10, duration: 0.05, yoyo: true, repeat: 5, onComplete: () => {
                                div.style.borderColor = 'rgba(255,255,255,0.1)';
                            }});
                        }
                    };
                    document.getElementById('country-list').appendChild(div);
                });
            } else if (currentLevel.type === GAME_TYPES.MAP) {
                board.innerHTML = `<h3 style="margin-bottom:20px">${currentLevel.q}</h3>${currentLevel.svg}`;
                setTimeout(() => {
                    document.querySelectorAll('.tap-region').forEach(r => {
                        r.onclick = function() {
                            if (this.id === currentLevel.tgt) {
                                this.style.fill = '#10b981';
                                playTone(600, 'sine', 0.2);
                                setTimeout(() => endLevel(true), 800);
                            } else {
                                this.style.fill = '#f43f5e';
                                playTone(200, 'sawtooth', 0.2);
                            }
                        };
                    });
                }, 100);
            }
        }

        function endLevel(win) {
            gameActive = false;
            clearInterval(timerInt);
            let ov = document.getElementById('result-overlay');
            ov.style.display = 'flex';
            
            if (win) {
                let stars = tLeft > 20 ? 3 : tLeft > 10 ? 2 : 1;
                let miles = stars * 100;
                player.miles += miles;
                player.completed[currentContinent.countries.find(c => c.name === document.getElementById('game-country-title').innerText).id] = stars;
                document.getElementById('result-title').innerText = "Trip Success!";
                document.getElementById('result-stars').innerText = '★ '.repeat(stars) + '☆ '.repeat(3-stars);
                document.getElementById('result-miles').innerText = miles;
                fireConfetti();
                playTone(800, 'sine', 0.5);
                syncPoints(miles);
            } else {
                document.getElementById('result-title').innerText = "Delayed!";
                document.getElementById('result-stars').innerText = "DELAYED";
                document.getElementById('result-miles').innerText = 0;
            }
        }

        function syncPoints(pts) {
            const uid = localStorage.getItem('qrio_active_id');
            if (uid) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, pointsToAdd: pts })
                }).catch(e => console.error("Sync error"));
            }
        }

        function closeResultAndBackToMap() {
            document.getElementById('result-overlay').style.display = 'none';
            selectContinent(currentContinent.id);
            updateHud();
        }

        function updateProfile() {
            document.getElementById('prof-avatar').innerText = player.avatar;
            document.getElementById('prof-name').innerText = player.name;
            document.getElementById('prof-miles').innerText = player.miles;
            let clears = Object.keys(player.completed).length;
            if (clears > 0) document.getElementById('badge-first').style.opacity = 1;
            if (clears >= 5) document.getElementById('badge-master').style.opacity = 1;
            if (clears >= TOTAL_COUNTRIES) document.getElementById('badge-world').style.opacity = 1;
        }

        // --- Confetti ---
        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for(let i=0; i<80; i++) {
                particles.push({
                    x: canvas.width/2, y: canvas.height/2,
                    vx: (Math.random()-0.5)*15, vy: (Math.random()-1)*15,
                    size: Math.random()*8+4, color: `hsl(${Math.random()*360}, 70%, 60%)`
                });
            }
            function draw() {
                if(particles.length === 0) return;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach((p, i) => {
                    p.vy += 0.4; p.x += p.vx; p.y += p.vy;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    if(p.y > canvas.height) particles.splice(i, 1);
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        // --- GSAP floating effects ---
        gsap.to('.orb', {
            x: "random(-100, 100)",
            y: "random(-100, 100)",
            duration: 6,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
    </script>
</body>
</html>
