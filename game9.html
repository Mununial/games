<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Economy Tycoon - QRIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #10b981; /* Emerald */
            --buy: #3b82f6;     /* Blue */
            --sell: #f59e0b;    /* Orange */
            --bg-base: #f8fafc;
            --pastel-blue: #e0f2fe;
            --pastel-purple: #f3e8ff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sketch-border: 2px solid #334155;
            --soft-shadow: 6px 6px 0px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: linear-gradient(135deg, var(--pastel-blue) 0%, var(--pastel-purple) 100%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Doodle Pattern Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10 Q 30 5, 40 20 T 70 10' fill='none' stroke='%23334155' stroke-width='2'/%3E%3Cpath d='M80 30 L 100 50 M 100 30 L 80 50' stroke='%23334155' stroke-width='2'/%3E%3Ccircle cx='50' cy='100' r='5' fill='none' stroke='%23334155' stroke-width='2'/%3E%3C/svg%3E");
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-bottom: var(--sketch-border);
            z-index: 100;
            gap: 20px;
            box-shadow: var(--soft-shadow);
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        .hud {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .stat {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat h3 {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .stat p {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 1px 1px 0 white;
        }

        .btn-exit {
            background: white;
            color: #ef4444;
            border: var(--sketch-border);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 4px 4px 0px #334155;
        }

        .btn-exit:hover {
            background: #ef4444;
            color: white;
            transform: rotate(-3deg) scale(1.05);
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }

        .market-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 1100px;
        }

        .commodity-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: var(--sketch-border);
            padding: 32px;
            border-radius: 24px 22px 26px 20px;
            text-align: center;
            transition: var(--transition);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.05);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .commodity-card:hover {
            transform: translateY(-5px) rotate(1deg);
            border-color: var(--primary);
        }

        .commodity-card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .price-tag {
            font-size: 3rem;
            font-weight: 900;
            margin: 10px 0;
            color: var(--text-main);
            text-shadow: 2px 2px 0 white;
        }

        .inventory-tag {
            color: var(--primary);
            font-weight: 900;
            margin-bottom: 24px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-trade {
            padding: 14px;
            font-size: 0.9rem;
            font-weight: 900;
            border: var(--sketch-border);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            width: 47%;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #334155;
        }

        .btn-buy {
            background: var(--buy);
            color: white;
        }

        .btn-buy:hover:not(:disabled) {
            transform: scale(1.05);
            background: #2563eb;
        }

        .btn-sell {
            background: var(--sell);
            color: white;
        }

        .btn-sell:hover:not(:disabled) {
            transform: scale(1.05);
            background: #d97706;
        }

        button:disabled {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: 2px 2px 0px #334155 !important;
        }

        .controls {
            margin-top: 50px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 24px 48px;
            border-radius: 50px;
            border: var(--sketch-border);
            box-shadow: var(--soft-shadow);
        }

        .btn-next {
            background: var(--primary);
            color: white;
            font-size: 1.25rem;
            font-weight: 900;
            border: var(--sketch-border);
            padding: 18px 48px;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 6px 6px 0px #334155;
        }

        .btn-next:hover {
            transform: scale(1.03) rotate(-1deg);
            background: #059669;
        }

        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(224, 242, 254, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .game-over h1 {
            color: var(--primary);
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 3px 3px 0 white;
        }

        .btn-restart {
            background: var(--primary);
            color: white;
            border: var(--sketch-border);
            padding: 20px 48px;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 40px;
            transition: var(--transition);
            text-transform: uppercase;
            box-shadow: 6px 6px 0px #334155;
        }

        @media (max-width: 1024px) {
            .market-board { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; padding: 15px; }
            .hud { flex-wrap: wrap; width: 100%; border-top: 1px dashed #cbd5e1; padding-top: 10px; }
            .stat { flex: 1; min-width: 80px; }
            .btn-exit { width: 100%; margin-top: 10px; }
            .nav-logo { display: none; }
            .market-board { grid-template-columns: 1fr; }
        }

    </style>
</head>

<body>
    <nav>
        <div class="nav-logo">
            <i class="fa-solid fa-coins"></i> <span>Qrio • Economy Tycoon</span>
        </div>
        <div class="hud">
            <div class="stat">
                <h3>Capital</h3>
                <p id="stat-money">$500</p>
            </div>
            <div class="stat">
                <h3>Day</h3>
                <p id="stat-day">1 / 15</p>
            </div>
            <div class="stat">
                <h3>Score</h3>
                <p id="stat-score" style="color:#059669;">0 px</p>
            </div>
        </div>
        <button class="btn-exit" onclick="window.close()">Exit to HUB</button>
    </nav>

    <div class="game-area">
        <h1 style="color: #047857; margin-bottom: 30px;">Goal: Reach $1500 in 15 Days</h1>

        <div class="market-board">
            <!-- Tech Stock -->
            <div class="commodity-card">
                <h2>Tech Stocks</h2>
                <div class="price-tag" id="price-tech">$100</div>
                <div class="inventory-tag">Owned: <span id="inv-tech">0</span></div>
                <button class="btn-trade btn-buy" id="btn-buy-tech" onclick="trade('tech', 'buy')">Buy</button>
                <button class="btn-trade btn-sell" id="btn-sell-tech" onclick="trade('tech', 'sell')">Sell</button>
            </div>

            <!-- Gold -->
            <div class="commodity-card">
                <h2>Gold Ounces</h2>
                <div class="price-tag" id="price-gold">$250</div>
                <div class="inventory-tag">Owned: <span id="inv-gold">0</span></div>
                <button class="btn-trade btn-buy" id="btn-buy-gold" onclick="trade('gold', 'buy')">Buy</button>
                <button class="btn-trade btn-sell" id="btn-sell-gold" onclick="trade('gold', 'sell')">Sell</button>
            </div>

            <!-- Oil -->
            <div class="commodity-card">
                <h2>Oil Barrels</h2>
                <div class="price-tag" id="price-oil">$50</div>
                <div class="inventory-tag">Owned: <span id="inv-oil">0</span></div>
                <button class="btn-trade btn-buy" id="btn-buy-oil" onclick="trade('oil', 'buy')">Buy</button>
                <button class="btn-trade btn-sell" id="btn-sell-oil" onclick="trade('oil', 'sell')">Sell</button>
            </div>
        </div>

        <div class="controls">
            <button class="btn-next" onclick="nextDay()">Advance to Next Day &rarr;</button>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1 id="goTitle">Market Closed</h1>
        <p id="goReason" style="font-size: 1.5rem;"></p>
        <p id="goScore" style="font-weight:bold; font-size:2rem; color:#059669;">Final Score: 0 px</p>
        <button class="btn-restart" onclick="location.reload()">Play Again</button>
    </div>

    <script>
        let money = 500;
        let day = 1;
        const MAX_DAYS = 15;
        let score = 0;

        const market = {
            tech: { price: 100, owned: 0, min: 20, max: 250, volatility: 40 },
            gold: { price: 250, owned: 0, min: 150, max: 500, volatility: 60 },
            oil: { price: 50, owned: 0, min: 10, max: 150, volatility: 25 }
        };

        function updateUI() {
            document.getElementById('stat-money').innerText = "$" + money;
            document.getElementById('stat-day').innerText = `${day} / ${MAX_DAYS}`;
            document.getElementById('stat-score').innerText = score + " px";

            for (let key in market) {
                document.getElementById(`price-${key}`).innerText = "$" + market[key].price;
                document.getElementById(`inv-${key}`).innerText = market[key].owned;

                document.getElementById(`btn-buy-${key}`).disabled = money < market[key].price;
                document.getElementById(`btn-sell-${key}`).disabled = market[key].owned <= 0;
            }

            if (day > MAX_DAYS) {
                endGame();
            }
        }

        function trade(item, action) {
            let cost = market[item].price;
            if (action === 'buy' && money >= cost) {
                money -= cost;
                market[item].owned++;
            } else if (action === 'sell' && market[item].owned > 0) {
                money += cost;
                market[item].owned--;
            }
            updateUI();
        }

        function nextDay() {
            day++;
            // Fluctuate prices
            for (let key in market) {
                let change = Math.floor(Math.random() * (market[key].volatility * 2)) - market[key].volatility;
                market[key].price += change;
                if (market[key].price < market[key].min) market[key].price = market[key].min;
                if (market[key].price > market[key].max) market[key].price = market[key].max;
            }
            updateUI();
        }

        function awardPoints(amount) {
            score += amount;
            let activeId = localStorage.getItem('qrio_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: amount })
                }).catch(console.error);
            }
        }

        function endGame() {
            // Liquidate assets
            for (let key in market) {
                money += market[key].price * market[key].owned;
                market[key].owned = 0;
            }

            let won = money >= 1500;
            if (won) {
                awardPoints(200);
            } else {
                awardPoints(50); // Participation
            }

            document.querySelector('.game-area').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('goTitle').innerText = won ? "Tycoon Status Achieved!" : "Market Closed";
            document.getElementById('goReason').innerText = `You ended with $${money}. Goal was $1500.`;
            document.getElementById('goScore').innerText = `Final Score: ${score} px`;
        }

        updateUI();
    </script>
</body>

</html>
