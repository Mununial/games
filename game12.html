<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Math Rush - Sweet Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --p-pink: #ff7eb9;
            --p-blue: #7afcff;
            --p-yellow: #fff77a;
            --p-purple: #c77aff;
            --glass: rgba(255, 255, 255, 0.4);
        }

        body {
            margin: 0; padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 100%);
            display: flex;
            flex-direction: column;
        }

        /* Sweet Background Decor */
        .decor {
            position: fixed; z-index: -1; opacity: 0.15; filter: blur(2px);
            pointer-events: none;
        }

        header {
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .hud-item {
            background: white;
            padding: 10px 25px;
            border-radius: 50px;
            display: flex; gap: 15px; align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 4px solid white;
        }

        .label { font-weight: 800; color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; }
        .value { font-weight: 900; font-size: 1.5rem; color: var(--p-pink); }

        .btn-home {
            width: 50px; height: 50px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #64748b; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s; border: 3px solid white;
        }
        .btn-home:hover { transform: scale(1.1); color: var(--p-pink); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 50px;
            position: relative;
        }

        .question-card {
            background: white;
            padding: 30px 60px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 6px solid #fbcfe8;
            margin-top: 20px;
            position: relative;
            z-index: 20;
        }

        #qText { font-size: 5rem; font-weight: 900; color: #1e293b; }

        .game-zone {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Large Candy Containers */
        .options-shelf {
            display: flex;
            gap: 30px;
            padding: 20px;
            border-radius: 40px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            min-height: 180px;
            width: auto;
            align-items: center;
            justify-content: center;
        }

        .candy {
            width: 140px; height: 140px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; color: white;
            cursor: pointer;
            border: 6px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .candy:hover { transform: scale(1.1) rotate(5deg); }
        .candy:active { transform: scale(0.9); }

        .c-pink { background: radial-gradient(circle at 30% 30%, #ff9ecd, #ec4899); }
        .c-blue { background: radial-gradient(circle at 30% 30%, #a5f3fc, #06b6d4); }
        .c-yellow { background: radial-gradient(circle at 30% 30%, #fef08a, #eab308); }

        /* Overlays */
        #startOverlay {
            position: fixed; inset: 0; z-index: 1000;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(224, 242, 254, 0.9));
            backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .btn-play {
            background: #10b981; color: white; padding: 20px 60px; border-radius: 50px;
            font-size: 2rem; font-weight: 900; border: none; cursor: pointer;
            box-shadow: 0 10px 0 #059669; transition: 0.2s;
        }
        .btn-play:hover { transform: translateY(-5px); box-shadow: 0 15px 0 #059669; }

        @media (max-width: 768px) {
            #qText { font-size: 3rem; }
            .candy { width: 100px; height: 100px; font-size: 2rem; }
            header { padding: 10px; flex-wrap: wrap; gap: 10px; }
            .hud-item { padding: 5px 15px; }
            .options-shelf { gap: 15px; padding: 10px; border-radius: 30px; }
        }
    </style>
</head>
<body>
    <!-- Floating Decor -->
    <i class="fa-solid fa-candy-cane decor" style="top:10%; left:10%; font-size:10rem; transform: rotate(-20deg);"></i>
    <i class="fa-solid fa-ice-cream decor" style="bottom:10%; right:15%; font-size:12rem; transform: rotate(15deg);"></i>
    <i class="fa-solid fa-cookie decor" style="top:50%; left:5%; font-size:6rem;"></i>

    <header>
        <div class="hud-item">
            <span class="label">Sugar Score</span>
            <span class="value" id="score">0</span>
        </div>
        <div class="hud-item" id="hearts" style="font-size:1.4rem;">
            ❤️❤️❤️
        </div>
        <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i></a>
    </header>

    <main>
        <div class="question-card" id="qCard">
            <div id="qText">7 + 6</div>
        </div>

        <div class="game-zone">
             <!-- Candies will fall and stay in the shelf -->
             <div class="options-shelf" id="shelf"></div>
        </div>
    </main>

    <div id="startOverlay">
        <h1 style="font-size:4rem; font-weight:900; color:var(--p-pink); margin-bottom:10px;">CANDY MATH</h1>
        <p style="font-size:1.2rem; color:#64748b; font-weight:700; margin-bottom:40px;">Choose the right candy to win prizes!</p>
        <button class="btn-play" onclick="initGame()">PLAY NOW</button>
    </div>

    <script>
        let score = 0;
        let health = 3;
        let winningAns = 0;
        let active = false;

        function initGame() {
            document.getElementById('startOverlay').style.display = 'none';
            active = true;
            nextQuestion();
        }

        function nextQuestion() {
            if(!active) return;
            
            // Random Difficulty
            const level = Math.min(Math.floor(score / 50) + 1, 5);
            const a = Math.floor(Math.random() * (10 * level)) + 1;
            const b = Math.floor(Math.random() * (10 * level)) + 1;
            winningAns = a + b;
            
            document.getElementById('qText').innerText = `${a} + ${b}`;
            gsap.from("#qCard", { y: -100, opacity: 0, scale: 0.5, duration: 0.8, ease: "back.out(1.7)" });

            // Generate Options
            let options = [winningAns];
            while(options.length < 3) {
                let wrong = winningAns + (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
                if(wrong > 0 && !options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);

            const shelf = document.getElementById('shelf');
            shelf.innerHTML = '';
            const colors = ['c-pink', 'c-blue', 'c-yellow'];

            options.forEach((val, idx) => {
                const candy = document.createElement('div');
                candy.className = `candy ${colors[idx]}`;
                candy.innerText = val;
                candy.onclick = () => checkAns(val, candy);
                shelf.appendChild(candy);

                // DROP FROM TOP ANIMATION (One by one)
                gsap.from(candy, {
                    y: -window.innerHeight,
                    rotation: Math.random() * 720,
                    duration: 1 + (idx * 0.2),
                    ease: "bounce.out"
                });
            });
        }

        function checkAns(val, el) {
            if(!active) return;
            
            if(val === winningAns) {
                score += 10;
                document.getElementById('score').innerText = score;
                gsap.to(el, { scale: 0.5, y: -200, opacity: 0, duration: 0.5, onComplete: nextQuestion });
                // Fade out other candies
                document.querySelectorAll('.candy').forEach(c => {
                    if(c !== el) gsap.to(c, { opacity: 0, scale: 0, duration: 0.5 });
                });
                syncPoints(10);
            } else {
                health--;
                updateHealth();
                gsap.to(el, { x: 20, repeat: 5, yoyo: true, duration: 0.05 });
                if(health <= 0) {
                    active = false;
                    alert("GAME OVER! Your Score: " + score);
                    location.reload();
                }
            }
        }

        function updateHealth() {
            let h = "";
            for(let i=0; i<health; i++) h += "❤️";
            document.getElementById('hearts').innerText = h;
        }

        function syncPoints(pts) {
            const uid = localStorage.getItem('qrio_active_id');
            if(uid) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, pointsToAdd: pts })
                }).catch(e => console.error(e));
            }
        }
    </script>
</body>
</html>
