<!DOCTYPE html>
<html lang="or">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching - BSE Odisha</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #e0e7ff;
            color: #3730a3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Mukta Malar', sans-serif;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #4338ca;
            text-align: center;
        }

        p {
            margin: 0 0 30px 0;
            font-size: 1.2rem;
            text-align: center;
            color: #4f46e5;
        }

        .game-area {
            display: flex;
            gap: 50px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(67, 56, 202, 0.1);
            border: 2px solid #c7d2fe;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: #e0e7ff;
            border: 2px solid #a5b4fc;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            border-color: #6366f1;
        }

        .card.selected {
            background: #6366f1;
            color: white;
            border-color: #4f46e5;
        }

        .card.matched {
            background: #10b981;
            color: white;
            border-color: #059669;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.5s, opacity 0.5s linear;
        }

        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            font-family: 'Mukta Malar';
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 231, 255, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .win-overlay h2 {
            font-size: 4rem;
            color: #4338ca;
            margin: 0;
        }
    </style>
</head>

<body>

    <button onclick="window.close()"
        style="position:absolute; top:20px; right:20px; background:transparent; border:2px solid #4f46e5; color:#4f46e5; padding:5px 15px; border-radius:20px; font-family:'Mukta Malar'; cursor:pointer; font-weight:bold;">ବନ୍ଦ
        କରନ୍ତୁ (Exit)</button>

    <h1>ପରମାଣୁ ଏବଂ ଅଣୁ (Atoms and Molecules)</h1>
    <p>Select a term on the left, then select its meaning on the right to match.</p>

    <div class="game-area">
        <div class="column" id="termsCol">
            <!-- Populated via JS -->
        </div>
        <div class="column" id="defsCol">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="win-overlay" id="winScreen">
        <h2>ସଫଳତା! (Success!)</h2>
        <p style="color:#4f46e5; font-size:1.5rem;">ଆପଣ ସବୁଗୁଡ଼ିକୁ ମିଳାଇ ଦେଇଛନ୍ତି! (You matched them all!)</p>
        <p style="color: #4ade80; font-size: 2rem;">+50 Points Earned!</p>
        <button class="btn" onclick="window.close()">ଫେରିଯାଆନ୍ତୁ (Return)</button>
    </div>

    <script>
        const pairs = [
            { id: 1, term: "ପରମାଣୁ (Atom)", def: "ମୂଳ କଣିକା (Basic Particle)" },
            { id: 2, term: "ଅଣୁ (Molecule)", def: "ପରମାଣୁ ସମୂହ (Group of atoms)" },
            { id: 3, term: "ଇଲେକ୍ଟ୍ରନ୍ (Electron)", def: "ଋଣାତ୍ମକ କଣିକା (Negative charge)" }
        ];

        let selectedTerm = null;
        let selectedDef = null;
        let matchesFound = 0;

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function render() {
            const termsCol = document.getElementById('termsCol');
            const defsCol = document.getElementById('defsCol');

            const terms = shuffle([...pairs]);
            const defs = shuffle([...pairs]);

            terms.forEach(t => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerText = t.term;
                div.onclick = () => selectCard('term', t.id, div);
                termsCol.appendChild(div);
            });

            defs.forEach(d => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerText = d.def;
                div.onclick = () => selectCard('def', d.id, div);
                defsCol.appendChild(div);
            });
        }

        let termEl = null; let defEl = null;

        function selectCard(type, id, el) {
            if (type === 'term') {
                if (termEl) termEl.classList.remove('selected');
                selectedTerm = id; termEl = el;
                el.classList.add('selected');
            } else {
                if (defEl) defEl.classList.remove('selected');
                selectedDef = id; defEl = el;
                el.classList.add('selected');
            }

            if (selectedTerm !== null && selectedDef !== null) {
                checkMatch();
            }
        }

        function checkMatch() {
            if (selectedTerm === selectedDef) {
                // matched
                const currentTermEl = termEl;
                const currentDefEl = defEl;
                setTimeout(() => {
                    currentTermEl.classList.remove('selected');
                    currentDefEl.classList.remove('selected');
                    currentTermEl.classList.add('matched');
                    currentDefEl.classList.add('matched');
                }, 300);

                matchesFound++;
                if (matchesFound === pairs.length) {
                    setTimeout(() => {
                        document.getElementById('winScreen').style.display = 'flex';
                        awardPoints();
                    }, 1000);
                }
            } else {
                // not matched
                const currentTermEl = termEl;
                const currentDefEl = defEl;
                setTimeout(() => {
                    currentTermEl.classList.remove('selected');
                    currentDefEl.classList.remove('selected');
                }, 500);
            }

            // reset selections
            selectedTerm = null; selectedDef = null;
            termEl = null; defEl = null;
        }

        function awardPoints() {
            let activeId = localStorage.getItem('QRIO_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: 50 })
                }).catch(console.error);
            }
        }

        render();
    </script>
</body>

</html>
