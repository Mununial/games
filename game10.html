<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultural Canvas - QRIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: #fee2e2;
            color: #881337;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #fecdd3;
        }

        .hud {
            display: flex;
            gap: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat h3 {
            color: #e11d48;
            margin: 0;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .stat p {
            margin: 5px 0 0;
            font-size: 1.5rem;
            font-weight: bold;
            color: #9f1239;
        }

        .btn-exit {
            background: transparent;
            color: #e11d48;
            border: 2px solid #e11d48;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Outfit';
        }

        .btn-exit:hover {
            background: #e11d48;
            color: white;
        }

        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .artifact-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 40px;
            min-width: 400px;
            border: 2px solid #fecdd3;
        }

        .artifact-card h2 {
            font-size: 2.5rem;
            color: #be123c;
            margin: 0;
        }

        .artifact-card p {
            font-size: 1.2rem;
            color: #64748b;
            margin-top: 10px;
        }

        .options {
            display: flex;
            gap: 20px;
        }

        .btn-era {
            background: white;
            border: 3px solid #fda4af;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #9f1239;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Outfit';
            width: 250px;
        }

        .btn-era:hover {
            background: #fff1f2;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(225, 29, 72, 0.2);
        }

        .btn-era.correct {
            background: #10b981;
            border-color: #059669;
            color: white;
        }

        .btn-era.wrong {
            background: #ef4444;
            border-color: #b91c1c;
            color: white;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(254, 226, 226, 0.95);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .game-over h1 {
            color: #be123c;
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .btn-restart {
            background: #e11d48;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <nav>
        <div style="font-weight: 900; font-size: 1.5rem;"><i class="fa-solid fa-palette"></i> Cultural Canvas</div>
        <div class="hud">
            <div class="stat">
                <h3>Question</h3>
                <p id="stat-q">1 / 5</p>
            </div>
            <div class="stat">
                <h3>Score</h3>
                <p id="stat-score" style="color:#e11d48;">0 px</p>
            </div>
        </div>
        <button class="btn-exit" onclick="window.close()">Exit Gallery</button>
    </nav>

    <div class="game-area" id="gameArea">
        <h1 style="color: #be123c; margin-bottom: 20px;">Match the Artifact to its Era</h1>

        <div class="artifact-card">
            <h2 id="artifactName">...</h2>
            <p id="artifactHint">...</p>
        </div>

        <div class="options">
            <button class="btn-era" onclick="checkAnswer('Ancient Egypt', this)">Ancient Egypt</button>
            <button class="btn-era" onclick="checkAnswer('Roman Empire', this)">Roman Empire</button>
            <button class="btn-era" onclick="checkAnswer('Renaissance', this)">Renaissance</button>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1 id="goTitle">Gallery Complete</h1>
        <p style="font-size: 1.5rem;">You matched historical artifacts.</p>
        <p id="goScore" style="font-weight:bold; font-size:2rem; color:#be123c;">Final Score: 0 px</p>
        <button class="btn-restart" onclick="location.reload()">Replay Gallery</button>
    </div>

    <script>
        const questions = [
            { name: "Great Pyramid of Giza", hint: "A massive tomb built for pharaohs.", answer: "Ancient Egypt" },
            { name: "The Colosseum", hint: "A grand amphitheater used for gladitorial contests.", answer: "Roman Empire" },
            { name: "The Mona Lisa", hint: "A masterpiece painting by Leonardo da Vinci.", answer: "Renaissance" },
            { name: "Hieroglyphics", hint: "A formal writing system used in tombs and papyrus.", answer: "Ancient Egypt" },
            { name: "The Pantheon", hint: "A former Roman temple, now a church.", answer: "Roman Empire" }
        ];

        let currentQList = [...questions].sort(() => Math.random() - 0.5); // Shuffle
        let currentIdx = 0;
        let score = 0;
        let lock = false;

        function loadQuestion() {
            if (currentIdx >= currentQList.length) {
                endGame();
                return;
            }
            lock = false;
            let q = currentQList[currentIdx];
            document.getElementById('artifactName').innerText = q.name;
            document.getElementById('artifactHint').innerText = `Hint: ${q.hint}`;
            document.getElementById('stat-q').innerText = `${currentIdx + 1} / ${currentQList.length}`;

            // reset buttons
            document.querySelectorAll('.btn-era').forEach(btn => {
                btn.classList.remove('correct', 'wrong');
            });
        }

        function checkAnswer(selectedEra, btnElement) {
            if (lock) return;
            lock = true;

            const correctEra = currentQList[currentIdx].answer;
            if (selectedEra === correctEra) {
                btnElement.classList.add('correct');
                awardPoints(25);
            } else {
                btnElement.classList.add('wrong');
                // find correct and light it up
                document.querySelectorAll('.btn-era').forEach(btn => {
                    if (btn.innerText === correctEra) btn.classList.add('correct');
                });
            }

            currentIdx++;
            setTimeout(loadQuestion, 1500);
        }

        function awardPoints(amount) {
            score += amount;
            document.getElementById('stat-score').innerText = score + " px";
            let activeId = localStorage.getItem('QRIO_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: amount })
                }).catch(console.error);
            }
        }

        function endGame() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('goScore').innerText = `Final Score: ${score} px`;
        }

        loadQuestion();
    </script>
</body>

</html>
