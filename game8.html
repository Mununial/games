<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civics City Builder - QRIO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #f59e0b; /* Amber */
            --accent: #6366f1;  /* Indigo */
            --bg-base: #f8fafc;
            --pastel-blue: #e0f2fe;
            --pastel-purple: #f3e8ff;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sketch-border: 2px solid #334155;
            --soft-shadow: 6px 6px 0px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: linear-gradient(135deg, var(--pastel-blue) 0%, var(--pastel-purple) 100%);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Doodle Pattern Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10 Q 30 5, 40 20 T 70 10' fill='none' stroke='%23334155' stroke-width='2'/%3E%3Cpath d='M80 80 Q 90 70, 100 90' fill='none' stroke='%23334155' stroke-width='2'/%3E%3Ccircle cx='20' cy='100' r='5' fill='none' stroke='%23334155' stroke-width='2'/%3E%3C/svg%3E");
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-bottom: var(--sketch-border);
            z-index: 100;
            gap: 20px;
            box-shadow: var(--soft-shadow);
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        .hud {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
        }

        .stat {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat h3 {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
        }

        .stat p {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 1px 1px 0 white;
        }

        .btn-exit {
            background: white;
            color: #ef4444;
            border: var(--sketch-border);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            white-space: nowrap;
            box-shadow: 4px 4px 0px #334155;
        }

        .btn-exit:hover {
            background: #ef4444;
            color: white;
            transform: rotate(-3deg) scale(1.05);
        }

        .game-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 24px;
        }

        .city-bg {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 40%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200"><path d="M0,200 L0,100 L50,100 L50,80 L100,80 L100,120 L200,120 L200,50 L300,50 L300,150 L400,150 L400,90 L500,90 L500,40 L600,40 L600,110 L700,110 L700,60 L800,60 L800,130 L900,130 L900,70 L1000,70 L1000,200 Z" fill="%23334155" opacity="0.05"/></svg>') repeat-x;
            background-size: cover;
            z-index: 1;
            animation: drift 60s linear infinite;
        }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: -2000px 0; }
        }

        .event-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            border: var(--sketch-border);
            padding: 48px;
            border-radius: 24px 22px 26px 20px;
            text-align: center;
            max-width: 540px;
            z-index: 10;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.05);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .event-card h2 {
            margin-top: 0;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-main);
            margin-bottom: 24px;
            text-shadow: 2px 2px 0 white;
        }

        .event-card p {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .decisions {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn-decision {
            padding: 18px 36px;
            font-size: 1.1rem;
            font-weight: 900;
            border: var(--sketch-border);
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0px #334155;
        }

        .btn-yes {
            background: #10b981;
            color: white;
        }

        .btn-yes:hover {
            transform: scale(1.05) rotate(1deg);
            background: #059669;
        }

        .btn-no {
            background: #ef4444;
            color: white;
        }

        .btn-no:hover {
            transform: scale(1.05) rotate(-1deg);
            background: #dc2626;
        }

        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(224, 242, 254, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .game-over h1 {
            color: #ef4444;
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 3px 3px 0 white;
        }

        .btn-restart {
            background: var(--primary);
            color: white;
            border: var(--sketch-border);
            padding: 20px 48px;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 40px;
            transition: var(--transition);
            text-transform: uppercase;
            box-shadow: 6px 6px 0px #334155;
        }

        .btn-restart:hover {
            transform: scale(1.05) rotate(-1deg);
            background: var(--accent);
        }

        @media (max-width: 1024px) {
            .hud { gap: 20px; }
            nav { padding: 20px; }
        }

        @media (max-width: 768px) {
            nav { flex-direction: column; padding: 15px; }
            .hud { flex-wrap: wrap; width: 100%; border-top: 1px dashed #cbd5e1; padding-top: 10px;}
            .stat { flex: 1; min-width: 80px; }
            .btn-exit { width: 100%; margin-top: 10px; }
            .nav-logo { display: none; }
            .event-card { padding: 30px; }
            .btn-decision { padding: 15px; font-size: 1rem; }
        }

    </style>
</head>

<body>
    <nav>
        <div class="nav-logo">
            <i class="fa-solid fa-landmark-dome"></i> <span>Qrio • City Builder</span>
        </div>
        <div class="hud">
            <div class="stat">
                <h3>Happiness</h3>
                <p id="stat-happy">100%</p>
            </div>
            <div class="stat">
                <h3>Treasury</h3>
                <p id="stat-funds">$500</p>
            </div>
            <div class="stat">
                <h3>Turn</h3>
                <p id="stat-turn">1</p>
            </div>
            <div class="stat">
                <h3>Score</h3>
                <p id="stat-score" style="color:#d97706;">0 px</p>
            </div>
        </div>
        <button class="btn-exit" onclick="window.close()">Exit to HUB</button>
    </nav>

    <div class="game-area">
        <div class="city-bg"></div>
        <div class="event-card" id="eventCard">
            <h2 id="eventTitle">Welcome Mayor!</h2>
            <p id="eventDesc">A corporation wants to build a factory. It will generate revenue but decrease citizen
                happiness due to pollution. Approve?</p>
            <div class="decisions">
                <button class="btn-decision btn-no" onclick="makeDecision(false)">Reject</button>
                <button class="btn-decision btn-yes" onclick="makeDecision(true)">Approve</button>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1 id="goTitle">Term Ended</h1>
        <p id="goReason">You ran out of funds or the city rioted.</p>
        <p id="goScore" style="font-weight:bold; font-size:2rem; color:#d97706;">Final Score: 0 px</p>
        <button class="btn-restart" onclick="location.reload()">Start New Term</button>
    </div>

    <script>
        let happiness = 100;
        let funds = 500;
        let turn = 1;
        let score = 0;

        const events = [
            { title: "Public Park", desc: "Citizens requested a new public park. Cost: $150. Happiness +20%.", cost: 150, hBoost: 20, revenue: 0, hPenalty: 0 },
            { title: "Tax Increase", desc: "Propose a city tax increase to raise funds. Revenue: $200. Happiness -15%.", cost: 0, hBoost: 0, revenue: 200, hPenalty: 15 },
            { title: "Education Grant", desc: "Fund a new school. Cost: $200. Happiness +30%.", cost: 200, hBoost: 30, revenue: 0, hPenalty: 0 },
            { title: "Industrial Zone", desc: "Allow a new heavy-industry zone. Revenue: $300. Happiness -25%.", cost: 0, hBoost: 0, revenue: 300, hPenalty: 25 },
            { title: "City Festival", desc: "Host an annual festival. Cost: $100. Happiness +25%.", cost: 100, hBoost: 25, revenue: 0, hPenalty: 0 },
            { title: "Cut Services", desc: "Reduce public services to save money. Revenue: $150. Happiness -20%.", cost: 0, hBoost: 0, revenue: 150, hPenalty: 20 }
        ];

        let currentEvent = events[0];

        function updateUI() {
            document.getElementById('stat-happy').innerText = happiness + "%";
            document.getElementById('stat-funds').innerText = "$" + funds;
            document.getElementById('stat-turn').innerText = turn;
            document.getElementById('stat-score').innerText = score + " px";

            if (happiness <= 0) {
                gameOver("City Riots!", "Happiness reached 0%. The citizens forced you to resign.");
            } else if (funds < 0) {
                gameOver("Bankrupt!", "The city ran out of money. You've been removed from office.");
            }
        }

        function spawnEvent() {
            currentEvent = events[Math.floor(Math.random() * events.length)];
            document.getElementById('eventTitle').innerText = currentEvent.title;
            document.getElementById('eventDesc').innerText = currentEvent.desc;
        }

        function awardPoints(amount) {
            score += amount;
            let activeId = localStorage.getItem('qrio_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: amount })
                }).catch(console.error);
            }
        }

        function makeDecision(approved) {
            if (approved) {
                funds += currentEvent.revenue;
                funds -= currentEvent.cost;
                happiness += currentEvent.hBoost;
                happiness -= currentEvent.hPenalty;
            } else {
                // If rejected, slight happiness penalty for doing nothing, or neutral
                happiness -= 5;
            }

            if (happiness > 100) happiness = 100;

            turn++;
            awardPoints(15); // Points for surviving a turn
            updateUI();

            if (happiness > 0 && funds >= 0) {
                spawnEvent();
            }
        }

        function gameOver(title, reason) {
            document.getElementById('eventCard').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('goTitle').innerText = title;
            document.getElementById('goReason').innerText = reason;
            document.getElementById('goScore').innerText = `Final Score: ${score} px`;
        }

        spawnEvent();
        updateUI();
    </script>
</body>

</html>
