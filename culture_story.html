<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythological Theatre - Indian Culture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background: #450a0a;
            color: #fecaca;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle, #7f1d1d 0%, #450a0a 100%);
        }

        nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
        }

        .btn-back {
            background: transparent;
            border: 2px solid #ef4444;
            color: #ef4444;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Outfit';
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #ef4444;
            color: white;
        }

        .hud {
            position: absolute;
            top: 20px;
            right: 40px;
            text-align: right;
        }

        .stage {
            background: url('https://www.transparenttextures.com/patterns/black-scales.png');
            width: 800px;
            padding: 50px;
            border-radius: 20px;
            border: 4px solid #b91c1c;
            box-shadow: 0 0 60px rgba(185, 28, 28, 0.4);
            text-align: center;
            position: relative;
        }

        .curtain-l,
        .curtain-r {
            position: absolute;
            top: 0;
            width: 50px;
            height: 100%;
            background: #991b1b;
        }

        .curtain-l {
            left: 0;
            border-radius: 15px 0 0 15px;
            border-right: 5px solid #7f1d1d;
        }

        .curtain-r {
            right: 0;
            border-radius: 0 15px 15px 0;
            border-left: 5px solid #7f1d1d;
        }

        .script-card {
            background: #fee2e2;
            color: #7f1d1d;
            padding: 30px;
            border-radius: 15px;
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 40px;
            line-height: 1.5;
            font-style: italic;
        }

        .btn-speak {
            background: #b91c1c;
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Outfit';
            box-shadow: 0 10px 0 #7f1d1d;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }

        .btn-speak:active {
            transform: translateY(10px);
            box-shadow: 0 0 0 #7f1d1d;
        }

        .btn-speak.listening {
            background: #f59e0b;
            box-shadow: 0 10px 0 #b45309;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        .feedback {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            color: #fca5a5;
            height: 40px;
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(69, 10, 10, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .game-over h2 {
            font-size: 4rem;
            color: #f87171;
            margin: 0;
        }

        .btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            font-family: 'Outfit';
            transition: 0.3s;
        }

        .btn:hover {
            background: #b91c1c;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem; color: #fca5a5;">
            Theatre Mode</div>
        <button class="btn-back" onclick="window.close()">Exit Stage</button>
    </nav>

    <div class="hud">
        <div style="font-size: 1.2rem; color: #fca5a5;">Score</div>
        <div style="font-size: 2rem; font-weight: bold; color: #fef08a;" id="scoreDisplay">0 px</div>
    </div>

    <div class="stage">
        <div class="curtain-l"></div>
        <div class="curtain-r"></div>

        <h2 style="color: #fca5a5; font-size: 2rem; margin-top: 0;">Scene 1: The Wise Minister</h2>
        <p style="font-size: 1.2rem; color: #f87171;">Voice Recognition Practice: Speak the script clearly.</p>

        <div class="script-card" id="scriptText">
            "Patience and wisdom are the greatest strengths."
        </div>

        <button class="btn-speak" id="btnRec" onclick="toggleRec()"> Start
            Performing</button>

        <div class="feedback" id="feedbackMsg"></div>
    </div>

    <div class="game-over" id="gameO">
        <h2>Curtain Call</h2>
        <p style="color:#fecaca; font-size:1.5rem;">The audience loved your performance!</p>
        <button class="btn" onclick="window.close()">Take a Bow (Return)</button>
    </div>

    <script>
        const scripts = [
            "Patience and wisdom are the greatest strengths.",
            "Truth alone triumphs.",
            "I shall fulfill my dharma without fail."
        ];
        let currentIdx = 0;
        let score = 0;

        // Setup Speech Rec
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        if (window.SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN'; // Indian English logic for the epics
            recognition.interimResults = false;

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                const target = scripts[currentIdx].toLowerCase().replace(/[.,'"]/g, '');
                const cleanTranscript = transcript.replace(/[.,'"]/g, '');

                // Extremely lenient check for gamification demo purposes
                // Just looking for overlap in words
                let wordsTarget = target.split(' ');
                let wordsTrans = cleanTranscript.split(' ');

                let matches = 0;
                wordsTarget.forEach(w => { if (wordsTrans.includes(w)) matches++; });

                if (matches >= wordsTarget.length / 2) {
                    // Success!
                    document.getElementById('feedbackMsg').innerText = "Excellent delivery! 🌟";
                    awardPoints(40);
                    currentIdx++;

                    if (currentIdx >= scripts.length) {
                        setTimeout(() => { document.getElementById('gameO').style.display = 'flex'; }, 2000);
                    } else {
                        setTimeout(() => {
                            document.getElementById('scriptText').innerText = '"' + scripts[currentIdx] + '"';
                            document.getElementById('feedbackMsg').innerText = "";
                            document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Start Performing';
                        }, 2500);
                    }
                } else {
                    document.getElementById('feedbackMsg').innerText = `Heard: "${cleanTranscript}". Try asking with more clarity!`;
                    document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Try Again';
                }
            };

            recognition.onend = function () {
                isRecording = false;
                document.getElementById('btnRec').classList.remove('listening');
            };

            recognition.onerror = function (event) {
                document.getElementById('feedbackMsg').innerText = "Microphone error. Please allow access.";
                isRecording = false;
                document.getElementById('btnRec').classList.remove('listening');
                document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Start Performing';
            };
        } else {
            document.getElementById('feedbackMsg').innerText = "Web Speech API not supported in this browser. Please use Chrome.";
        }

        function toggleRec() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
                return;
            }
            recognition.start();
            isRecording = true;
            document.getElementById('btnRec').classList.add('listening');
            document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Listening...';
            document.getElementById('feedbackMsg').innerText = "Speak now...";
        }

        function awardPoints(pts) {
            score += pts;
            document.getElementById('scoreDisplay').innerText = score + " px";
            let activeId = localStorage.getItem('QRIO_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: pts })
                }).catch(console.error);
            }
        }
    </script>
</body>

</html>
