<!DOCTYPE html>
<html lang="or">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching - BSE Odisha</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #4f46e5; /* Indigo */
            --accent: #10b981;  /* Emerald */
            --bg-base: #f8fafc;
            --pastel-indigo: #eef2ff;
            --pastel-blue: #e0f2fe;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --sketch-border: 2px solid #334155;
            --soft-shadow: 6px 6px 0px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background: linear-gradient(135deg, var(--pastel-indigo) 0%, var(--pastel-blue) 100%);
            color: var(--text-main);
            font-family: 'Outfit', 'Mukta Malar', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Doodle Pattern Overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 10 Q 30 5, 40 20 T 70 10' fill='none' stroke='%23334155' stroke-width='2'/%3E%3Cpath d='M80 80 Q 90 70, 100 90' fill='none' stroke='%23334155' stroke-width='2'/%3E%3Cpath d='M40 40 L 60 60 M 60 40 L 40 60' stroke='%23334155' stroke-width='2'/%3E%3C/svg%3E");
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            color: var(--text-main);
            text-shadow: 2px 2px 0 white;
            text-align: center;
        }

        p {
            margin: 0 0 30px 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
        }

        .game-area {
            display: flex;
            gap: 50px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px 22px 28px 20px;
            border: var(--sketch-border);
            box-shadow: var(--soft-shadow);
            backdrop-filter: blur(20px);
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border: var(--sketch-border);
            padding: 20px 30px;
            border-radius: 16px 14px 18px 15px;
            font-size: 1.4rem;
            font-weight: 900;
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.05);
            color: var(--text-main);
        }

        .card:hover {
            transform: translateY(-4px) rotate(1deg);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
            background: var(--pastel-indigo);
        }

        .card.selected {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
            box-shadow: 6px 6px 0px #334155;
        }

        .card.matched {
            background: var(--accent);
            color: white;
            border-color: #334155;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.5s, opacity 0.5s linear;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: var(--sketch-border);
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.25rem;
            font-weight: 900;
            cursor: pointer;
            margin-top: 30px;
            transition: var(--transition);
            box-shadow: 6px 6px 0px #334155;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05) rotate(1deg);
            background: var(--accent);
        }

        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(224, 242, 254, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 40px;
        }

        .win-overlay h2 {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-main);
            margin: 0;
            text-shadow: 3px 3px 0 white;
        }

        .btn-exit {
            position: absolute;
            top: 24px;
            right: 24px;
            background: white;
            border: var(--sketch-border);
            color: var(--primary);
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 4px 4px 0px #334155;
        }

        .btn-exit:hover {
            transform: scale(1.05) rotate(-2deg);
            background: #ef4444;
            color: white;
        }

    </style>
</head>

<body>

    <button class="btn-exit" onclick="window.close()">ବନ୍ଦ କରନ୍ତୁ (Exit)</button>

    <h1>ପରମାଣୁ ଏବଂ ଅଣୁ (Atoms and Molecules)</h1>
    <p>Select a term on the left, then select its meaning on the right to match.</p>

    <div class="game-area">
        <div class="column" id="termsCol">
            <!-- Populated via JS -->
        </div>
        <div class="column" id="defsCol">
            <!-- Populated via JS -->
        </div>
    </div>

    <div class="win-overlay" id="winScreen">
        <h2>ସଫଳତା! (Success!)</h2>
        <p style="color:#4f46e5; font-size:1.5rem;">ଆପଣ ସବୁଗୁଡ଼ିକୁ ମିଳାଇ ଦେଇଛନ୍ତି! (You matched them all!)</p>
        <p style="color: #4ade80; font-size: 2rem;">+50 Points Earned!</p>
        <button class="btn" onclick="window.close()">ଫେରିଯାଆନ୍ତୁ (Return)</button>
    </div>

    <script>
        const pairs = [
            { id: 1, term: "ପରମାଣୁ (Atom)", def: "ମୂଳ କଣିକା (Basic Particle)" },
            { id: 2, term: "ଅଣୁ (Molecule)", def: "ପରମାଣୁ ସମୂହ (Group of atoms)" },
            { id: 3, term: "ଇଲେକ୍ଟ୍ରନ୍ (Electron)", def: "ଋଣାତ୍ମକ କଣିକା (Negative charge)" }
        ];

        let selectedTerm = null;
        let selectedDef = null;
        let matchesFound = 0;

        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function render() {
            const termsCol = document.getElementById('termsCol');
            const defsCol = document.getElementById('defsCol');

            const terms = shuffle([...pairs]);
            const defs = shuffle([...pairs]);

            terms.forEach(t => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerText = t.term;
                div.onclick = () => selectCard('term', t.id, div);
                termsCol.appendChild(div);
            });

            defs.forEach(d => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerText = d.def;
                div.onclick = () => selectCard('def', d.id, div);
                defsCol.appendChild(div);
            });
        }

        let termEl = null; let defEl = null;

        function selectCard(type, id, el) {
            if (type === 'term') {
                if (termEl) termEl.classList.remove('selected');
                selectedTerm = id; termEl = el;
                el.classList.add('selected');
            } else {
                if (defEl) defEl.classList.remove('selected');
                selectedDef = id; defEl = el;
                el.classList.add('selected');
            }

            if (selectedTerm !== null && selectedDef !== null) {
                checkMatch();
            }
        }

        function checkMatch() {
            if (selectedTerm === selectedDef) {
                // matched
                const currentTermEl = termEl;
                const currentDefEl = defEl;
                setTimeout(() => {
                    currentTermEl.classList.remove('selected');
                    currentDefEl.classList.remove('selected');
                    currentTermEl.classList.add('matched');
                    currentDefEl.classList.add('matched');
                }, 300);

                matchesFound++;
                if (matchesFound === pairs.length) {
                    setTimeout(() => {
                        document.getElementById('winScreen').style.display = 'flex';
                        awardPoints();
                    }, 1000);
                }
            } else {
                // not matched
                const currentTermEl = termEl;
                const currentDefEl = defEl;
                setTimeout(() => {
                    currentTermEl.classList.remove('selected');
                    currentDefEl.classList.remove('selected');
                }, 500);
            }

            // reset selections
            selectedTerm = null; selectedDef = null;
            termEl = null; defEl = null;
        }

        function awardPoints() {
            let activeId = localStorage.getItem('qrio_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: 50 })
                }).catch(console.error);
            }
        }

        render();
    </script>
</body>

</html>
