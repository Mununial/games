<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Master - 3D Rhythm Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --m-gold: #fbbf24;
            --m-purple: #8b5cf6;
            --m-cyan: #06b6d4;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Outfit', sans-serif; color: white;
        }

        /* 3D Cosmic BG */
        .cosmic-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 100%, #1e1b4b 0%, #000 70%);
        }

        .mandala-aura {
            position: absolute; bottom: -20vh; left: 50%; transform: translateX(-50%);
            width: 100vh; height: 100vh; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%; animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.3; transform: translateX(-50%) scale(0.9); } to { opacity: 0.8; transform: translateX(-50%) scale(1.1); } }

        /* HUD */
        nav {
            padding: 24px 40px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--m-gold); letter-spacing: 2px; }

        .btn-exit {
            width: 50px; height: 50px; background: var(--glass); border: 1px solid var(--glass-border);
            color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: 0.3s;
        }
        .btn-exit:hover { background: #ef4444; transform: scale(1.1); }

        /* Game Layout */
        main {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: calc(100% - 100px); gap: 20px;
        }

        .rhythm-engine {
            width: 450px; height: 550px;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            transform: perspective(1000px) rotateX(10deg);
        }

        .lane-track {
            position: absolute; inset: 0; display: flex;
            background: linear-gradient(to top, rgba(139, 92, 246, 0.05), transparent);
        }

        .lane { flex: 1; border-right: 1px solid rgba(255,255,255,0.05); position: relative; }
        .lane:last-child { border: none; }

        .hit-line {
            position: absolute; bottom: 80px; width: 100%; height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(251, 191, 36, 0.1), transparent);
            border-top: 1px dashed rgba(251, 191, 36, 0.3);
            border-bottom: 1px dashed rgba(251, 191, 36, 0.3);
            display: flex; justify-content: space-around; align-items: center;
        }

        .note {
            position: absolute; width: 70px; height: 70px;
            background: radial-gradient(circle at 30% 30%, #fef08a, #fbbf24);
            border-radius: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #000; font-size: 1.5rem;
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4);
            border: 2px solid white;
        }

        /* Controls */
        .control-bar {
            display: flex; gap: 20px; width: 450px;
        }

        .drum-btn {
            flex: 1; padding: 25px; border-radius: 25px; border: 1px solid var(--glass-border);
            background: var(--glass); color: white; cursor: pointer;
            font-family: 'Outfit'; font-weight: 900; font-size: 1.2rem;
            transition: 0.1s; backdrop-filter: blur(10px);
        }
        .drum-btn:active, .drum-btn.active { background: var(--m-gold); color: #000; transform: scale(0.95); }

        .score-box {
            background: var(--glass); padding: 10px 30px; border-radius: 50px;
            font-weight: 900; color: var(--m-gold); border: 1px solid var(--glass-border);
            font-size: 1.5rem; letter-spacing: 2px;
        }

        #gameOver {
            position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); display: none; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        @media (max-width: 600px) {
            .rhythm-engine, .control-bar { width: 95vw; }
        }
    </style>
</head>
<body>
    <div class="cosmic-bg">
        <div class="mandala-aura"></div>
    </div>

    <nav>
        <div class="logo">Qrio MELODY MASTER</div>
        <div class="score-box" id="scoreDisplay">0 px</div>
        <a href="game10.html" class="btn-exit"><i class="fa-solid fa-house"></i></a>
    </nav>

    <main>
        <div class="rhythm-engine">
            <div class="lane-track">
                <div class="lane" id="lane0"></div>
                <div class="lane" id="lane1"></div>
                <div class="lane" id="lane2"></div>
            </div>
            <div class="hit-line">
                <span style="opacity:0.2; font-weight:900;">THA</span>
                <span style="opacity:0.2; font-weight:900;">DHIN</span>
                <span style="opacity:0.2; font-weight:900;">NA</span>
            </div>
        </div>

        <div class="control-bar">
            <button class="drum-btn" id="btn0" onmousedown="hit(0)">THA</button>
            <button class="drum-btn" id="btn1" onmousedown="hit(1)">DHIN</button>
            <button class="drum-btn" id="btn2" onmousedown="hit(2)">NA</button>
        </div>
    </main>

    <div id="gameOver">
        <h1 style="font-size: 5rem; font-weight: 900; color: var(--m-gold);">PERFORMANCE COMPLETE</h1>
        <p style="font-size: 1.5rem; opacity: 0.6;">Your rhythm sync was legendary.</p>
        <h2 id="finalScore" style="font-size: 3rem; margin-top: 20px;">0 PX</h2>
        <button class="drum-btn" style="width:auto; padding: 20px 60px; margin-top: 30px;" onclick="location.reload()">REPEAT PERFORMANCE</button>
    </div>

    <script>
        let score = 0;
        let spawned = 0;
        const totalNotes = 20;
        let activeNotes = [];
        let gameRunning = true;

        const SYMBOLS = ["THA", "DHI", "NA"];

        // Input
        window.addEventListener('keydown', (e) => {
            if(e.key === 'a' || e.key === 'ArrowLeft') hit(0);
            if(e.key === 's' || e.key === 'ArrowDown') hit(1);
            if(e.key === 'd' || e.key === 'ArrowRight') hit(2);
        });

        function spawnNote() {
            if(!gameRunning || spawned >= totalNotes) return;
            
            const laneId = Math.floor(Math.random() * 3);
            const parent = document.getElementById(`lane${laneId}`);
            const note = document.createElement('div');
            note.className = 'note';
            note.innerText = SYMBOLS[laneId];
            note.style.top = '-80px';
            parent.appendChild(note);

            const nObj = { el: note, lane: laneId, top: -80 };
            activeNotes.push(nObj);
            spawned++;

            gsap.to(nObj, {
                top: 550,
                duration: 3,
                ease: "none",
                onUpdate: () => { note.style.top = nObj.top + 'px'; },
                onComplete: () => {
                    if(note.parentNode) {
                        note.remove();
                        activeNotes = activeNotes.filter(n => n !== nObj);
                        if(spawned >= totalNotes && activeNotes.length === 0) endPerformance();
                    }
                }
            });

            setTimeout(spawnNote, 1000 + Math.random() * 500);
        }

        function hit(laneId) {
            if(!gameRunning) return;
            
            // Visual feedback
            const btn = document.getElementById(`btn${laneId}`);
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 100);

            // Hit detection (range 370 - 470)
            const target = activeNotes.find(n => n.lane === laneId && n.top > 370 && n.top < 470);
            
            if(target) {
                score += 100;
                document.getElementById('scoreDisplay').innerText = score + " px";
                gsap.to(target.el, { scale: 2, opacity: 0, duration: 0.2, onComplete: () => target.el.remove() });
                activeNotes = activeNotes.filter(n => n !== target);
                syncPoints(10);
            } else {
                gsap.to(".rhythm-engine", { x: 10, repeat: 3, yoyo: true, duration: 0.05 });
            }
        }

        function endPerformance() {
            gameRunning = false;
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalScore').innerText = score + " PX";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function syncPoints(pts) {
            const uid = localStorage.getItem('qrio_active_id');
            if(uid) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: uid, pointsToAdd: pts })
                }).catch(e => console.error(e));
            }
        }

        spawnNote();
    </script>
</body>
</html>
