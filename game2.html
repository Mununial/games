<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Math - 3D Ultra</title>
    
    <!-- Matter.js for physics bubbles -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <!-- Three.js for 3D BG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Gochi+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #facc15;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        /* Ambient 3D Background */
        #bgCanvas {
            position: fixed; inset: 0;
            z-index: -1;
            opacity: 0.6;
        }

        .input_video { display: none; }
        #output_canvas {
            display: block; width: 100vw; height: 100vh;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        /* Premium UI Layer */
        .ui-layer {
            position: fixed; inset: 0;
            z-index: 100;
            pointer-events: none;
            display: flex; flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 15px 30px;
            border-radius: 20px;
            pointer-events: all;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex; gap: 20px;
        }

        .stat-item { text-align: center; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .stat-value { font-size: 1.5rem; font-weight: 900; color: var(--accent); }

        .btn-home {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; cursor: pointer; text-decoration: none;
            transition: 0.3s; pointer-events: all;
        }
        .btn-home:hover { background: #ef4444; border-color: #ef4444; transform: scale(1.1); }

        /* Goal Bubble */
        .problem-bubble {
            position: fixed; top: 120px; left: 50%;
            transform: translateX(-50%);
            background: white; border-radius: 40px;
            padding: 20px 60px;
            color: #1e293b;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            pointer-events: all;
            z-index: 150;
        }
        .problem-bubble p { font-size: 0.8rem; font-weight: 900; color: var(--primary); margin: 0; }
        #problemText { font-size: 3.5rem; font-weight: 900; margin: 5px 0 0 0; }

        /* Feedback Effect */
        #feedback {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 6rem; font-weight: 900;
            opacity: 0; pointer-events: none;
            z-index: 500;
        }

        /* Starting Overlays */
        #loader, #startMenu {
            position: fixed; inset: 0; z-index: 1000;
            background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }

        .btn-primary {
            background: var(--primary); color: white;
            padding: 20px 50px; border-radius: 50px;
            font-weight: 900; border: none; font-size: 1.4rem;
            cursor: pointer; box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
            margin-top: 30px;
        }
        .btn-primary:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5); }

        /* Physics Elements in Canvas are drawn via JS */

        @media (max-width: 768px) {
            .problem-bubble { width: 90%; padding: 10px; top: 100px; }
            #problemText { font-size: 2rem; }
            .glass-card { padding: 10px 15px; gap: 10px; }
            .stat-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <video class="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <div class="ui-layer">
        <div class="header">
            <a href="index.html" class="btn-home"><i class="fa-solid fa-house"></i></a>
            <div class="glass-card">
                <div class="stat-item">
                    <div class="stat-label">Zen Score</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="level">1</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="timer">60</div>
                </div>
            </div>
            <div style="width: 60px;"></div> <!-- Spacer -->
        </div>

        <div class="problem-bubble">
            <p>TARGET GOAL</p>
            <div id="problemText">...</div>
        </div>

        <div id="feedback">PERFECT!</div>
    </div>

    <!-- Starting Screens -->
    <div id="loader">
        <div style="width:80px; height:80px; border:8px solid #334155; border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <h2 style="margin-top:20px; font-weight:900;">CALIBRATING SENSORS...</h2>
        <p style="opacity:0.6;">Standing by for camera initialization.</p>
    </div>

    <div id="startMenu" style="display:none;">
        <h1 style="font-size:4rem; font-weight:900; color:var(--primary);">MATH 3D BURST</h1>
        <p style="max-width:500px; font-size:1.2rem; opacity:0.8; margin-top:20px;">Use your hands in mid-air to pop the bubbles that solve the math equations!</p>
        <button class="btn-primary" onclick="startGame()">ENTER THE DIMENSION</button>
    </div>

    <script>
        // --- 3JS BG ---
        function init3DBG() {
            const canvas = document.getElementById('bgCanvas');
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 300;

            const group = new THREE.Group();
            const geo = new THREE.IcosahedronGeometry(10, 0);
            for(let i=0; i<100; i++) {
                const mat = new THREE.MeshBasicMaterial({ color: i % 2 ? 0x8b5cf6 : 0xec4899, wireframe: true });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                mesh.scale.setScalar(Math.random()*5 + 1);
                group.add(mesh);
            }
            scene.add(group);

            function anim() {
                requestAnimationFrame(anim);
                group.rotation.y += 0.001;
                group.rotation.x += 0.0005;
                renderer.render(scene, camera);
            }
            anim();
        }
        init3DBG();

        // --- Physics Engine (Matter.js) ---
        const Engine = Matter.Engine,
              Render = Matter.Render,
              World = Matter.World,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite;

        const engine = Engine.create();
        engine.world.gravity.y = -0.05; // Floating upwards

        const canvasOut = document.getElementById('output_canvas');
        const ctxOut = canvasOut.getContext('2d');
        canvasOut.width = window.innerWidth;
        canvasOut.height = window.innerHeight;

        let bubbles = [];
        let score = 0;
        let curLevel = 1;
        let curProblem = { eq: "", ans: 0 };
        let active = false;
        let timeLeft = 60;

        function startGame() {
            document.getElementById('startMenu').style.display = 'none';
            active = true;
            newProblem();
            startTimer();
            loop();
        }

        function newProblem() {
            const a = Math.floor(Math.random()*10) + 1;
            const b = Math.floor(Math.random()*10) + 1;
            curProblem = { eq: `${a} + ${b}`, ans: a + b };
            document.getElementById('problemText').innerText = curProblem.eq;
            gsap.from('#problemText', { scale: 0.5, duration: 0.5, ease: "back.out(1.7)" });
            
            spawnBubbles(curProblem.ans);
        }

        function spawnBubbles(correct) {
            bubbles.forEach(b => World.remove(engine.world, b.body));
            bubbles = [];
            
            let answers = [correct];
            for(let i=0; i<3; i++) {
                let w = correct + Math.floor(Math.random()*5) + 1;
                while(answers.includes(w)) w++;
                answers.push(w);
            }
            answers.sort(() => Math.random() - 0.5);

            answers.forEach((val, i) => {
                const radius = 60 + Math.random()*20;
                const body = Bodies.circle(
                    (window.innerWidth/5) * (i+1), 
                    window.innerHeight + 100, 
                    radius, 
                    { restitution: 0.8, frictionAir: 0.02 }
                );
                const bubble = {
                    body, val, radius,
                    color: i % 2 ? '#8b5cf6' : '#ec4899',
                    popped: false
                };
                bubbles.push(bubble);
                World.add(engine.world, body);
            });
        }

        let handLandmarks = [];
        function loop() {
            if(!active) return;
            Engine.update(engine);
            
            ctxOut.clearRect(0, 0, canvasOut.width, canvasOut.height);
            
            // Draw Video (Mirrored)
            ctxOut.save();
            ctxOut.translate(canvasOut.width, 0);
            ctxOut.scale(-1, 1);
            ctxOut.globalAlpha = 0.4;
            ctxOut.drawImage(videoElement, 0, 0, canvasOut.width, canvasOut.height);
            ctxOut.restore();

            // Draw Bubbles
            bubbles.forEach(b => {
                if(b.popped) return;
                const { x, y } = b.body.position;
                ctxOut.save();
                ctxOut.translate(x, y);
                
                // Draw Glass Circle
                ctxOut.beginPath();
                ctxOut.arc(0, 0, b.radius, 0, Math.PI*2);
                ctxOut.fillStyle = 'rgba(255,255,255,0.1)';
                ctxOut.fill();
                ctxOut.strokeStyle = b.color;
                ctxOut.lineWidth = 4;
                ctxOut.stroke();
                
                // Draw Shine
                ctxOut.beginPath();
                ctxOut.arc(-b.radius*0.3, -b.radius*0.3, b.radius*0.2, 0, Math.PI*2);
                ctxOut.fillStyle = 'rgba(255,255,255,0.4)';
                ctxOut.fill();

                // Draw Text
                ctxOut.fillStyle = 'white';
                ctxOut.font = "900 30px Outfit";
                ctxOut.textAlign = "center";
                ctxOut.textBaseline = "middle";
                ctxOut.fillText(b.val, 0, 0);
                
                ctxOut.restore();

                // Collision with Hands
                handLandmarks.forEach(hands => {
                    const tip = hands[8]; // Index finger tip
                    const hx = (1 - tip.x) * canvasOut.width;
                    const hy = tip.y * canvasOut.height;
                    
                    const dist = Math.hypot(hx - x, hy - y);
                    if(dist < b.radius + 20) {
                        popBubble(b);
                    }
                });
            });

            requestAnimationFrame(loop);
        }

        function popBubble(b) {
            if(b.popped) return;
            b.popped = true;
            World.remove(engine.world, b.body);
            
            if(b.val === curProblem.ans) {
                score += 100;
                document.getElementById('score').innerText = score;
                showFeedback("CORRECT!", "#10b981");
                setTimeout(newProblem, 500);
            } else {
                showFeedback("WRONG!", "#ef4444");
                setTimeout(newProblem, 500);
            }
        }

        function showFeedback(txt, col) {
            const el = document.getElementById('feedback');
            el.innerText = txt;
            el.style.color = col;
            gsap.fromTo(el, { scale: 0, opacity: 0 }, { scale: 1.5, opacity: 1, duration: 0.4, yoyo: true, repeat: 1 });
        }

        function startTimer() {
            const int = setInterval(() => {
                if(!active) { clearInterval(int); return; }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    active = false;
                    alert("GAME OVER! Final Score: " + score);
                    location.reload();
                }
            }, 1000);
        }

        // --- MediaPipe Fingers ---
        const videoElement = document.querySelector('.input_video');
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults((results) => {
            if(!active && document.getElementById('loader').style.display !== 'none') {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('startMenu').style.display = 'flex';
            }
            handLandmarks = results.multiHandLandmarks;
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 1280, height: 720
        });
        camera.start();

        window.addEventListener('resize', () => {
            canvasOut.width = window.innerWidth;
            canvasOut.height = window.innerHeight;
            // 3JS Resize is handled separately if needed but simple enough
        });

        @keyframes spin { to { transform: rotate(360deg); } }
    </script>
</body>
</html>
