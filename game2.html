<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Math Gesture Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
            /* darker overall text */
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        /* Video element for MediaPipe (hidden, processed in canvas) */
        .input_video {
            display: none;
        }

        /* Main Game Canvas */
        .output_canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI Overlay */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* Let clicks/touches pass through to canvas if needed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.8);
            color: #1e293b;
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 20px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            font-size: 1.5rem;
            font-weight: 700;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .problem-container {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.5rem 3rem;
            border-radius: 30px;
            border: 2px solid #3b82f6;
            text-align: center;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            animation: pulseGlow 2s infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            }

            100% {
                box-shadow: 0 0 40px rgba(59, 130, 246, 0.8);
            }
        }

        .problem-text {
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .feedback-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: 5rem;
            font-weight: 900;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .feedback-text.show-success {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            color: #4ade80;
        }

        .feedback-text.show-error {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            color: #f87171;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 20px;
        }
        @media (max-width: 768px) {
            .ui-layer { padding: 1rem; }
            .top-bar { flex-direction: column; align-items: center; gap: 10px; }
            .score-board { font-size: 1rem; padding: 0.8rem 1.5rem; width: 100%; box-sizing: border-box; text-align: center; }
            .problem-container { padding: 1rem 2rem; width: 90%; }
            .problem-text { font-size: 2.22rem; }
            #startScreen h2, #gameOverReason { font-size: 2rem; }
            button { width: 90% !important; font-size: 1.5rem !important; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Three.js Canvas -->
    <canvas id="bgCanvas"></canvas>

    <video class="input_video" autoplay playsinline></video>
    <canvas class="output_canvas" id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="top-bar">
            <button onclick="window.close()" style="pointer-events:all; padding: 10px 20px; font-size: 1rem; border-radius: 12px; border: 1px solid rgba(59,130,246,0.3); background: rgba(255,255,255,0.8); color:#1e293b; font-weight:700;"><i class="fa-solid fa-arrow-left"></i> HUB</button>
            <div class="score-board">
                Score: <span id="scoreVal">0</span> | Level: <span id="levelVal">1</span> | Time: <span
                    id="timeVal">60</span>s | Mistakes: <span id="mistakesVal">0</span>/3
            </div>
            <div class="problem-container">
                <p>Solve This</p>
                <div class="problem-text" id="problemDisplay">Loading...</div>
            </div>
            <div style="width: 150px;"></div> <!-- Spacer for flex alignment -->
        </div>
        <div class="feedback-text" id="feedbackDisplay">Good Job!</div>
    </div>

    <div class="loader" id="loadingScreen">
        Initializing AI Hand Tracking...<br>Please allow camera access.
    </div>
    <div class="loader" id="startScreen" style="display: none; cursor: pointer; background: rgba(59, 130, 246, 0.9);">
        <h2>Camera Ready!</h2>
        <div style="margin: 20px 0;">
            <label for="handSelect" style="font-size: 1.5rem;">Which hand will you play with?</label><br>
            <select id="handSelect"
                style="margin-top: 10px; padding: 10px; font-size: 1.2rem; border-radius: 10px; border: none;">
                <option value="Any">Both / Any Hand</option>
                <option value="Right">Right Hand</option>
                <option value="Left">Left Hand</option>
            </select>
        </div>
        <button id="startBtn"
            style="padding: 15px 40px; font-size: 2rem; font-weight: bold; border-radius: 15px; border: none; cursor: pointer; width: 100%;">Start
            Game</button>
        <p style="font-size: 1rem; margin-top: 15px;">(Enables Audio)</p>
    </div>
    <div id="gameOverScreen"
        style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; background: rgba(255, 255, 255, 0.85); flex-direction: column; align-items: center; justify-content: center; text-align: center; backdrop-filter: blur(10px);">
        <h1 id="gameOverReason" style="font-size: 5rem; color: #f87171; margin: 0;">Game Over!</h1>
        <h2 style="font-size: 3rem; margin: 20px 0; color: #1e293b;">Final Score: <span id="finalScoreVal">0</span></h2>

        <div style="margin: 20px 0;">
            <label for="retryHandSelect" style="font-size: 1.5rem; color: #1e293b;">Switch Hand?</label><br>
            <select id="retryHandSelect"
                style="margin-top: 10px; padding: 10px; font-size: 1.2rem; border-radius: 10px; border: 1px solid #ccc; background: white; color: black;">
                <option value="Any">Both / Any Hand</option>
                <option value="Right">Right Hand</option>
                <option value="Left">Left Hand</option>
            </select>
        </div>

        <button id="retryBtn"
            style="padding: 20px 50px; font-size: 2.5rem; font-weight: bold; font-family: 'Outfit', sans-serif; background: #3b82f6; color: white; border: none; border-radius: 20px; cursor: pointer; margin-top: 10px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.6); transition: transform 0.2s;"
            onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">Play
            Again</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 3JS Background Logic ---
        const bgCanvas = document.getElementById('bgCanvas');
        const bgRenderer = new THREE.WebGLRenderer({ canvas: bgCanvas, antialias: true });
        bgRenderer.setPixelRatio(window.devicePixelRatio);
        bgRenderer.setSize(window.innerWidth, window.innerHeight);
        bgRenderer.setClearColor(0xffffff, 1);

        const bgScene = new THREE.Scene();
        bgScene.fog = new THREE.FogExp2(0xffffff, 0.002);

        const bgCamera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        bgCamera.position.z = 200;

        const bgGeometry = new THREE.IcosahedronGeometry(2, 0);
        const bgMaterial = new THREE.MeshBasicMaterial({ color: 0xe2e8f0, wireframe: true });

        const bgGroup = new THREE.Group();
        for (let i = 0; i < 200; i++) {
            const mesh = new THREE.Mesh(bgGeometry, bgMaterial);
            mesh.position.x = (Math.random() - 0.5) * 800;
            mesh.position.y = (Math.random() - 0.5) * 800;
            mesh.position.z = (Math.random() - 0.5) * 800;
            mesh.rotation.x = Math.random() * 2 * Math.PI;
            mesh.rotation.y = Math.random() * 2 * Math.PI;
            bgGroup.add(mesh);
        }
        bgScene.add(bgGroup);

        function animateBg() {
            requestAnimationFrame(animateBg);
            bgGroup.rotation.x += 0.0005;
            bgGroup.rotation.y += 0.001;
            bgRenderer.render(bgScene, bgCamera);
        }
        animateBg();

        // --- Game State ---
        let score = 0;
        let level = 1;
        let currentProblem = { equation: "", answer: 0 };
        let bubbles = [];
        let particles = [];
        let timeLeft = 60;
        let timerInterval;
        let gameActive = false;
        let mistakes = 0;
        const MAX_MISTAKES = 3;
        let isSystemReady = false;
        let isTransitioning = false;
        let preferredHand = "Any";

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTick() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime); // keep it subtle
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playSuccessSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playErrorSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.2);
        }

        function playGameOverSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.8);
        }

        // --- Matter.js Setup ---
        const Engine = Matter.Engine,
            Render = Matter.Render,
            Runner = Matter.Runner,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Body = Matter.Body,
            Vector = Matter.Vector;

        const engine = Engine.create();
        // Antigravity environment: slight upward force, negligible gravity
        engine.world.gravity.y = -0.05;
        engine.world.gravity.x = 0;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // Boundaries to keep bubbles inside
        const wallOptions = { isStatic: true, render: { visible: false } };
        let ground = Bodies.rectangle(width / 2, height + 50, width, 100, wallOptions);
        let leftWall = Bodies.rectangle(-50, height / 2, 100, height, wallOptions);
        let rightWall = Bodies.rectangle(width + 50, height / 2, 100, height, wallOptions);
        // Lower ceiling prevents bubbles from covering the top UI elements
        let ceiling = Bodies.rectangle(width / 2, 100, width, 200, wallOptions);

        Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);

        // Start Physics Engine Runner
        const runner = Runner.create();
        Runner.run(runner, engine);

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;

            // Update 3js
            bgCamera.aspect = width / height;
            bgCamera.updateProjectionMatrix();
            bgRenderer.setSize(width, height);

            // Re-position walls
            Body.setPosition(ground, { x: width / 2, y: height + 50 });
            Body.setPosition(leftWall, { x: -50, y: height / 2 });
            Body.setPosition(rightWall, { x: width + 50, y: height / 2 });
            Body.setPosition(ceiling, { x: width / 2, y: 100 });
        });

        // --- Math Generation ---
        function generateProblem() {
            if (!gameActive) return;
            isTransitioning = false;
            let maxNum = 10 * level;
            let a = Math.floor(Math.random() * maxNum) + 1;
            let b = Math.floor(Math.random() * maxNum) + 1;

            let ops = ['+', '-'];
            if (level >= 3) ops.push('*');

            let operation = ops[Math.floor(Math.random() * ops.length)];
            let answer;

            if (operation === '-') {
                if (a < b) [a, b] = [b, a]; // Ensure positive answers for simplicity
                answer = a - b;
            } else if (operation === '+') {
                answer = a + b;
            } else if (operation === '*') {
                a = Math.floor(Math.random() * (5 + level)) + 1;
                b = Math.floor(Math.random() * (5 + level)) + 1;
                answer = a * b;
            }

            currentProblem = { equation: `${a} ${operation} ${b}`, answer: answer };
            document.getElementById('problemDisplay').innerText = currentProblem.equation;

            spawnBubbles(answer);
        }

        function createBubbleList(correctAnswer, count) {
            let answers = [correctAnswer];
            let attempts = 0;
            while (answers.length < count && attempts < 100) {
                let diff = Math.floor(Math.random() * 10) - 5;
                if (diff === 0) diff = 1;
                let wrong = correctAnswer + diff;
                if (wrong >= 0 && !answers.includes(wrong)) {
                    answers.push(wrong);
                }
                attempts++;
            }
            // Shuffle
            return answers.sort(() => Math.random() - 0.5);
        }

        function spawnBubbles(correctAnswer) {
            // Remove old bubbles
            bubbles.forEach(b => Composite.remove(engine.world, b.body));
            bubbles = [];

            let numBubbles = Math.min(3 + Math.floor(level / 2), 6); // More bubbles at higher levels
            let answersList = createBubbleList(correctAnswer, numBubbles);

            answersList.forEach((ans, index) => {
                let radius = 60 + Math.random() * 20;
                let x = (width / (numBubbles + 1)) * (index + 1) + (Math.random() * 100 - 50);
                let y = height - radius - 20;

                let body = Bodies.circle(x, y, radius, {
                    restitution: 0.9, // Bouncy
                    frictionAir: 0.01, // Drift slowly in space
                    density: 0.001
                });

                // Random initial velocity to make them float around
                Body.setVelocity(body, {
                    x: (Math.random() - 0.5) * 5,
                    y: (Math.random() - 1) * 10
                });

                let bubbleProps = {
                    body: body,
                    value: ans,
                    isCorrect: ans === correctAnswer,
                    radius: radius,
                    color: `hsl(${Math.random() * 360}, 80%, 60%)`,
                    popped: false
                };

                Composite.add(engine.world, body);
                bubbles.push(bubbleProps);
            });
        }

        // --- Visual Effects ---
        function spawnParticles(x, y, color) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 8 + 3
                });
            }
        }

        function showFeedback(text, isSuccess) {
            const el = document.getElementById('feedbackDisplay');
            el.innerText = text;
            el.className = 'feedback-text ' + (isSuccess ? 'show-success' : 'show-error');
            setTimeout(() => {
                el.className = 'feedback-text';
            }, 1000);
        }

        // --- Collision Logic (Gesture to Physics) ---
        // Calculates distance between fingertip and bubbles to detect a "touch"
        let lastTouchTime = 0;

        function checkCollisions(fingerPos) {
            if (!gameActive || isTransitioning) return;
            let now = Date.now();
            if (now - lastTouchTime < 500) return; // Debounce touches

            for (let i = 0; i < bubbles.length; i++) {
                let b = bubbles[i];
                if (b.popped) continue;

                let dx = fingerPos.x - b.body.position.x;
                let dy = fingerPos.y - b.body.position.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // Add a small threshold (20px) to hit radius for easier selection via webcam
                if (distance < b.radius + 20) {
                    if (b.isCorrect) {
                        // Success!
                        isTransitioning = true;
                        playSuccessSound();
                        b.popped = true;
                        Composite.remove(engine.world, b.body);
                        spawnParticles(b.body.position.x, b.body.position.y, b.color);
                        showFeedback("Awesome!", true);

                        // Update Progress
                        score += 5;
                        level = Math.floor(score / 20) + 1;
                        document.getElementById('scoreVal').innerText = score;
                        document.getElementById('levelVal').innerText = level;

                        // System-wide QRIO Point Sync
                        if (window.localStorage) {
                            let activeId = localStorage.getItem('qrio_active_id');
                            if (activeId) {
                                fetch('/api/points', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ userId: activeId, pointsToAdd: 5 })
                                }).catch(console.error);
                            }
                        }

                        lastTouchTime = now;
                        setTimeout(generateProblem, 1000); // 1 sec delay before next question

                    } else {
                        // Incorrect - Apply repulsive force
                        playErrorSound();
                        showFeedback("Try Again", false);
                        let forceMagnitude = 0.05 * b.body.mass;
                        Body.applyForce(b.body, b.body.position, {
                            x: (dx > 0 ? -1 : 1) * forceMagnitude,
                            y: (dy > 0 ? -1 : 1) * forceMagnitude
                        });
                        lastTouchTime = now + 1000; // Longer penalty

                        mistakes++;
                        document.getElementById('mistakesVal').innerText = mistakes;
                        if (mistakes >= MAX_MISTAKES) {
                            endGame("Too Many Mistakes!");
                        }
                    }
                    break;
                }
            }
        }

        function startGame() {
            initAudio();
            document.getElementById('gameOverScreen').style.display = 'none';
            score = 0;
            level = 1;
            timeLeft = 60;
            mistakes = 0;
            gameActive = true;
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('timeVal').innerText = timeLeft;
            document.getElementById('timeVal').style.color = 'white';
            document.getElementById('mistakesVal').innerText = mistakes;

            generateProblem();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                document.getElementById('timeVal').innerText = timeLeft;
                playTick();

                if (timeLeft <= 10) {
                    document.getElementById('timeVal').style.color = '#f87171';
                }
                if (timeLeft <= 0) {
                    endGame("Time's Up!");
                }
            }, 1000);
        }

        function endGame(reason = "Game Over!") {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('problemDisplay').innerText = reason;
            bubbles.forEach(b => Composite.remove(engine.world, b.body));
            bubbles = [];

            playGameOverSound();

            document.getElementById('gameOverReason').innerText = reason;
            document.getElementById('finalScoreVal').innerText = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        // --- Custom Renderer ---
        let handLandmarks = null;
        let handLabels = null;

        function gameLoop() {
            // Draw Video Background instead of just clearing
            ctx.save();
            ctx.translate(canvas.width, 0); // Mirror horizontally
            ctx.scale(-1, 1);
            if (videoElement.readyState >= 2) {
                // To keep aspect ratio, use object-fit approach. For simplicity, we draw and stretch.
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            }
            ctx.restore();

            // Add very light tint so the video remains clear but background handles the white theme better
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1.0;

            // Draw Bubbles
            bubbles.forEach(b => {
                if (b.popped) return;

                let pos = b.body.position;
                let angle = b.body.angle;

                ctx.save();
                ctx.translate(pos.x, pos.y);
                ctx.rotate(angle);

                // Glow effect
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 20;

                // Bubble Circle
                ctx.beginPath();
                ctx.arc(0, 0, b.radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = b.color;
                ctx.stroke();

                ctx.shadowBlur = 0; // Reset shadow for text

                // Text
                ctx.fillStyle = '#1e293b'; // Darker text for white bubbles
                ctx.font = `bold ${b.radius * 0.8}px Outfit`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Counter-rotate text so it remains readable while bubble rotates
                ctx.rotate(-angle);
                ctx.fillText(b.value, 0, 0);

                ctx.restore();
            });

            // Draw Hand Tracking
            if (handLandmarks) {
                handLandmarks.forEach((landmarks, index) => {
                    // Swap left and right according to user request
                    let rawLabel = handLabels && handLabels[index] ? handLabels[index].label : "Any";
                    let handLabel = "Any";
                    if (rawLabel === "Left") handLabel = "Right";
                    if (rawLabel === "Right") handLabel = "Left";

                    if (preferredHand !== "Any" && handLabel !== preferredHand) {
                        return; // Skip rendering and collision for the unwanted hand
                    }

                    // Draw Hand Skeleton via custom loop (lighter visual footprint)
                    // We just highlight the index finger for interactions
                    let indexTip = landmarks[8]; // INDEX_FINGER_TIP

                    // MIRROR coordinates (webcam acts as mirror)
                    let screenX = (1 - indexTip.x) * width;
                    let screenY = indexTip.y * height;

                    // Draw tracking cursor at index finger
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, 15, 0, 2 * Math.PI);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fill();
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#3b82f6';
                    ctx.stroke();

                    // Check logic
                    checkCollisions({ x: screenX, y: screenY });
                });
            }

            requestAnimationFrame(gameLoop);
        }

        // --- MediaPipe Hand Tracking Setup ---
        const videoElement = document.getElementsByClassName('input_video')[0];

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: (window.innerWidth < 1024) ? 0 : 1, // Faster model for mobile
            minDetectionConfidence: 0.5, // slightly more relaxed for mobile
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (!isSystemReady) {
                isSystemReady = true;
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('startScreen').style.display = 'block';
            }
            handLandmarks = results.multiHandLandmarks;
            handLabels = results.multiHandedness;
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            preferredHand = document.getElementById('handSelect').value;
            // Sync the retry screen dropdown to match
            document.getElementById('retryHandSelect').value = preferredHand;
            document.getElementById('startScreen').style.display = 'none';
            startGame();
            gameLoop();
        });

        document.getElementById('retryBtn').addEventListener('click', () => {
            preferredHand = document.getElementById('retryHandSelect').value;
            startGame();
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: (window.innerWidth < 1024) ? 640 : 1280,
            height: (window.innerWidth < 1024) ? 480 : 720
        });

        // Start Everything
        camera.start().catch(err => {
            console.error(err);
            document.getElementById('loadingScreen').innerHTML = "Camera access denied or unavailable.<br>Please allow permissions and refresh.";
        });
    </script>
</body>

</html>
