<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythological Theatre - Indian Culture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root {
            --primary: #ef4444;
            --primary-hover: #b91c1c;
            --bg: #0b1120;
            --panel: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #fcd34d;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: radial-gradient(circle at center, #450a0a, #0b1120);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-sizing: border-box;
            z-index: 1000;
        }

        .btn-back {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Outfit';
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-back:hover {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .hud {
            position: fixed;
            top: 85px;
            right: 40px;
            text-align: right;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .stage {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(15px);
            width: clamp(320px, 90vw, 850px);
            padding: 60px 40px;
            border-radius: 32px;
            border: 2px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        .curtain-l,
        .curtain-r {
            position: absolute;
            top: 0;
            width: 60px;
            height: 100%;
            background: linear-gradient(to bottom, #991b1b, #450a0a);
            opacity: 0.8;
            z-index: 1;
        }

        .curtain-l {
            left: 0;
            border-radius: 32px 0 0 32px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .curtain-r {
            right: 0;
            border-radius: 0 32px 32px 0;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .script-card {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            padding: 40px;
            border-radius: 24px;
            font-size: 2.2rem;
            font-weight: 800;
            margin: 30px 0;
            line-height: 1.4;
            font-style: italic;
            border: 1px solid var(--glass-border);
            position: relative;
            z-index: 2;
        }

        .btn-speak {
            background: var(--primary);
            color: white;
            border: none;
            padding: 22px 50px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Outfit';
            box-shadow: 0 10px 0 #991b1b;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .btn-speak:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #991b1b;
        }

        .btn-speak.listening {
            background: #f59e0b;
            box-shadow: 0 8px 0 #b45309;
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 8px 0 #b45309, 0 0 0 0 rgba(245, 158, 11, 0.4); }
            50% { transform: scale(1.02); box-shadow: 0 8px 0 #b45309, 0 0 30px 10px rgba(245, 158, 11, 0.2); }
            100% { transform: scale(1); box-shadow: 0 8px 0 #b45309, 0 0 0 0 rgba(245, 158, 11, 0); }
        }

        .feedback {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 30px;
            color: var(--accent);
            height: 40px;
            position: relative;
            z-index: 2;
        }

        .game-over {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
        }

        .game-over h2 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #f87171 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 800;
            cursor: pointer;
            margin-top: 40px;
            font-family: 'Outfit';
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(239, 68, 68, 0.3);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav>
        <div style="font-weight: 900; font-size: 1.5rem; color: #fca5a5;">
            Theatre Mode</div>
        <button class="btn-back" onclick="window.close()">Exit Stage</button>
    </nav>

    <div class="hud">
        <div style="font-size: 1.2rem; color: #fca5a5;">Score</div>
        <div style="font-size: 2rem; font-weight: bold; color: #fef08a;" id="scoreDisplay">0 px</div>
    </div>

    <div class="stage">
        <div class="curtain-l"></div>
        <div class="curtain-r"></div>

        <h2 style="color: #fca5a5; font-size: 2rem; margin-top: 0;">Scene 1: The Wise Minister</h2>
        <p style="font-size: 1.2rem; color: #f87171;">Voice Recognition Practice: Speak the script clearly.</p>

        <div class="script-card" id="scriptText">
            "Patience and wisdom are the greatest strengths."
        </div>

        <button class="btn-speak" id="btnRec" onclick="toggleRec()"> Start
            Performing</button>

        <div class="feedback" id="feedbackMsg"></div>
    </div>

    <div class="game-over" id="gameO">
        <h2>Curtain Call</h2>
        <p style="color:#fecaca; font-size:1.5rem;">The audience loved your performance!</p>
        <button class="btn" onclick="window.close()">Take a Bow (Return)</button>
    </div>

    <script>
        const scripts = [
            "Patience and wisdom are the greatest strengths.",
            "Truth alone triumphs.",
            "I shall fulfill my dharma without fail."
        ];
        let currentIdx = 0;
        let score = 0;

        // Setup Speech Rec
        window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        if (window.SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN'; // Indian English logic for the epics
            recognition.interimResults = false;

            recognition.onresult = function (event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                const target = scripts[currentIdx].toLowerCase().replace(/[.,'"]/g, '');
                const cleanTranscript = transcript.replace(/[.,'"]/g, '');

                // Extremely lenient check for gamification demo purposes
                // Just looking for overlap in words
                let wordsTarget = target.split(' ');
                let wordsTrans = cleanTranscript.split(' ');

                let matches = 0;
                wordsTarget.forEach(w => { if (wordsTrans.includes(w)) matches++; });

                if (matches >= wordsTarget.length / 2) {
                    // Success!
                    document.getElementById('feedbackMsg').innerText = "Excellent delivery! 🌟";
                    awardPoints(40);
                    currentIdx++;

                    if (currentIdx >= scripts.length) {
                        setTimeout(() => { document.getElementById('gameO').style.display = 'flex'; }, 2000);
                    } else {
                        setTimeout(() => {
                            document.getElementById('scriptText').innerText = '"' + scripts[currentIdx] + '"';
                            document.getElementById('feedbackMsg').innerText = "";
                            document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Start Performing';
                        }, 2500);
                    }
                } else {
                    document.getElementById('feedbackMsg').innerText = `Heard: "${cleanTranscript}". Try asking with more clarity!`;
                    document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Try Again';
                }
            };

            recognition.onend = function () {
                isRecording = false;
                document.getElementById('btnRec').classList.remove('listening');
            };

            recognition.onerror = function (event) {
                document.getElementById('feedbackMsg').innerText = "Microphone error. Please allow access.";
                isRecording = false;
                document.getElementById('btnRec').classList.remove('listening');
                document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Start Performing';
            };
        } else {
            document.getElementById('feedbackMsg').innerText = "Web Speech API not supported in this browser. Please use Chrome.";
        }

        function toggleRec() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
                return;
            }
            recognition.start();
            isRecording = true;
            document.getElementById('btnRec').classList.add('listening');
            document.getElementById('btnRec').innerHTML = '<i class="fa-solid fa-microphone"></i> Listening...';
            document.getElementById('feedbackMsg').innerText = "Speak now...";
        }

        function awardPoints(pts) {
            score += pts;
            document.getElementById('scoreDisplay').innerText = score + " px";
            let activeId = localStorage.getItem('QRIO_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: pts })
                }).catch(console.error);
            }
        }
    </script>
</body>

</html>
