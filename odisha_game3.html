<!DOCTYPE html>
<html lang="or">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Circuit - BSE Odisha</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #262626;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Mukta Malar', sans-serif;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #38bdf8;
            text-align: center;
        }

        p {
            margin: 0 0 30px 0;
            font-size: 1.2rem;
            text-align: center;
            color: #a3a3a3;
        }

        .workspace {
            width: 600px;
            height: 400px;
            background: #404040;
            border-radius: 20px;
            position: relative;
            border: 4px dashed #737373;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .item {
            position: absolute;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .item i {
            font-size: 4rem;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: 0.3s;
        }

        .item span {
            margin-top: 10px;
            font-weight: bold;
            padding: 2px 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            font-size: 0.9rem;
        }

        #bulb {
            top: 50px;
            left: 250px;
        }

        #bulb i {
            color: #525252;
        }

        /* Note: using emoji/icon logic below */

        #battery {
            bottom: 50px;
            left: 100px;
        }

        #switch {
            bottom: 50px;
            right: 100px;
        }

        .wire {
            position: absolute;
            border: 3px solid #ef4444;
            border-radius: 20px;
            display: none;
            transform-origin: left top;
            z-index: 0;
            box-shadow: 0 0 5px #ef4444;
        }

        /* Wiring Paths */
        #wire1 {
            top: 110px;
            left: 275px;
            width: 3px;
            height: 190px;
        }

        /* bulb down */
        #wire2 {
            top: 300px;
            left: 140px;
            width: 135px;
            height: 3px;
        }

        /* bottom left to center */
        #wire3 {
            top: 300px;
            left: 275px;
            width: 165px;
            height: 3px;
        }

        /* center to right */
        .btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            font-family: 'Mukta Malar';
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn:hover:not(:disabled) {
            background: #0369a1;
        }

        .btn:disabled {
            background: #525252;
            color: #a3a3a3;
            cursor: not-allowed;
        }

        .glow-effect {
            box-shadow: 0 0 50px #facc15, inset 0 0 20px #facc15;
            background: radial-gradient(circle, rgba(250, 204, 21, 1) 0%, rgba(250, 204, 21, 0) 70%);
            position: absolute;
            width: 200px;
            height: 200px;
            top: 0px;
            left: 200px;
            border-radius: 50%;
            opacity: 0;
            transition: 0.5s;
            pointer-events: none;
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(38, 38, 38, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .win-overlay h2 {
            font-size: 4rem;
            color: #38bdf8;
            margin: 0;
        }
    </style>
</head>

<body>
    <button onclick="window.close()"
        style="position:absolute; top:20px; right:20px; background:transparent; border:2px solid #38bdf8; color:#38bdf8; padding:5px 15px; border-radius:20px; font-family:'Mukta Malar'; cursor:pointer; font-weight:bold;">ବନ୍ଦ
        କରନ୍ତୁ (Exit)</button>
    <h1>ବିଦ୍ୟୁତ ସ୍ରୋତ ଏବଂ ସର୍କିଟ (Electric Current & Circuit)</h1>
    <p>Click "Connect Wires" and then turn on the Switch to light the bulb.</p>
    <div class="workspace" id="ws">
        <div class="glow-effect" id="glow"></div>

        <div class="wire" id="wire1"></div>
        <div class="wire" id="wire2"></div>
        <div class="wire" id="wire3"></div>
        <div class="item" id="bulb" style="font-size: 4rem; filter: grayscale(1);">
            💡
            <span>ବଲ୍ବ (Bulb)</span>
        </div>
        <div class="item" id="battery" style="font-size: 4rem;">
            🔋
            <span>ବ୍ୟାଟେରୀ (Battery)</span>
        </div>
        <div class="item" id="switch" style="font-size: 4rem; filter: opacity(0.8);" onclick="toggleSwitch()">
            🕹️
            <span>ସ୍ୱିଚ୍ (Switch - OFF)</span>
        </div>
    </div>
    <button class="btn" id="btnConnect" onclick="connectWires()">ତାର ସଂଯୋଗ କରନ୍ତୁ (Connect Wires)</button>
    <div class="win-overlay" id="winScreen">
        <h2>ସଫଳତା! (Success!)</h2>
        <p style="color:#7dd3fc; font-size:1.5rem;">ସର୍କିଟ ସମ୍ପୂର୍ଣ୍ଣ ହୋଇଛି! (Circuit Complete!)</p>
        <p style="color: #4ade80; font-size: 2rem;">+50 Points Earned!</p>
        <button class="btn" onclick="window.close()">ଫେରିଯାଆନ୍ତୁ (Return)</button>
    </div>
    <script>
        let connected = false;
        let switchOn = false;
        function connectWires() {
            document.getElementById('wire1').style.display = 'block';
            document.getElementById('wire2').style.display = 'block';
            document.getElementById('wire3').style.display = 'block';
            document.getElementById('btnConnect').disabled = true;
            document.getElementById('btnConnect').innerText = "ସଂଯୁକ୍ତ ହୋଇଛି (Connected)";
            connected = true;
        }
        function toggleSwitch() {
            if (!connected) {
                alert("ଦୟାକରି ପ୍ରଥମେ ତାର ସଂଯୋଗ କରନ୍ତୁ! (Please connect the wires first.)");
                return;
            }
            switchOn = !switchOn;

            const btnSpan = document.querySelector('#switch span');
            if (switchOn) {
                btnSpan.innerText = "ସ୍ୱିଚ୍ (Switch - ON)";
                document.getElementById('switch').style.transform = 'scaleY(-1)'; // flip visually
                document.getElementById('bulb').style.filter = 'grayscale(0)';
                document.getElementById('glow').style.opacity = '1';

                setTimeout(() => {
                    document.getElementById('winScreen').style.display = 'flex';
                    awardPoints();
                }, 1000);
            } else {
                btnSpan.innerText = "ସ୍ୱିଚ୍ (Switch - OFF)";
                document.getElementById('switch').style.transform = 'scaleY(1)';
                document.getElementById('bulb').style.filter = 'grayscale(1)';
                document.getElementById('glow').style.opacity = '0';
            }
        }
        function awardPoints() {
            let activeId = localStorage.getItem('QRIO_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: 50 })
                }).catch(console.error);
            }
        }
    </script>
</body>

</html>
