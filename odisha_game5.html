<!DOCTYPE html>
<html lang="or">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - BSE Odisha</title>
    <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #fffbeb;
            color: #b45309;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Mukta Malar', sans-serif;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #d97706;
            text-align: center;
        }

        p {
            margin: 0 0 30px 0;
            font-size: 1.2rem;
            text-align: center;
            color: #b45309;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            grid-template-rows: repeat(2, 120px);
            gap: 15px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(180, 83, 9, 0.1);
            border: 2px solid #fde68a;
        }

        .card {
            width: 120px;
            height: 120px;
            background: #fef3c7;
            border: 2px solid #fcd34d;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            perspective: 1000px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card-inner {
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-sizing: border-box;
        }

        .card-front {
            background: #fcd34d;
            color: white;
        }

        /* The covered side */
        .card-front::after {
            content: '?';
        }

        .card-back {
            background: white;
            color: #d97706;
            transform: rotateY(180deg);
            font-weight: bold;
            border: 2px solid #fcd34d;
        }

        .card.matched {
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s 0.5s, opacity 0.5s linear;
        }

        .btn {
            background: #d97706;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            font-family: 'Mukta Malar';
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 251, 235, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .win-overlay h2 {
            font-size: 4rem;
            color: #d97706;
            margin: 0;
        }
    </style>
</head>

<body>

    <button onclick="window.close()"
        style="position:absolute; top:20px; right:20px; background:transparent; border:2px solid #d97706; color:#d97706; padding:5px 15px; border-radius:20px; font-family:'Mukta Malar'; cursor:pointer; font-weight:bold;">ବନ୍ଦ
        କରନ୍ତୁ (Exit)</button>

    <h1>ଶବ୍ଦ ଏବଂ ଚିତ୍ର (Words & Pictures)</h1>
    <p>Flip the cards to match the Odia word with its picture.</p>

    <div class="game-grid" id="grid">
        <!-- Populated via JS -->
    </div>

    <div class="win-overlay" id="winScreen">
        <h2>ସଫଳତା! (Success!)</h2>
        <p style="color:#b45309; font-size:1.5rem;">ଆପଣ ସବୁଗୁଡ଼ିକୁ ମିଳାଇ ଦେଇଛନ୍ତି! (Memory Master!)</p>
        <p style="color: #4ade80; font-size: 2rem;">+50 Points Earned!</p>
        <button class="btn" onclick="window.close()">ଫେରିଯାଆନ୍ତୁ (Return)</button>
    </div>

    <script>
        const items = [
            { id: 1, val: "ସୂର୍ଯ୍ୟ", type: "word" }, { id: 1, val: "☀️", type: "icon" },
            { id: 2, val: "ଗଛ", type: "word" }, { id: 2, val: "🌳", type: "icon" },
            { id: 3, val: "ଫୁଲ", type: "word" }, { id: 3, val: "🌸", type: "icon" },
            { id: 4, val: "ପକ୍ଷୀ", type: "word" }, { id: 4, val: "🐦", type: "icon" }
        ];

        let cards = [...items].sort(() => Math.random() - 0.5);
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matches = 0;

        function render() {
            const grid = document.getElementById('grid');
            cards.forEach((data, index) => {
                const el = document.createElement('div');
                el.className = 'card';
                el.dataset.id = data.id;

                // if it's a word, scale down font slightly
                const fontSize = data.type === 'word' ? '1.5rem' : '3rem';

                el.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front"></div>
                        <div class="card-back" style="font-size: ${fontSize}">${data.val}</div>
                    </div>
                `;

                el.addEventListener('click', () => flipCard(el));
                grid.appendChild(el);
            });
        }

        function flipCard(el) {
            if (lockBoard) return;
            if (el === firstCard) return;

            el.classList.add('flipped');

            if (!firstCard) {
                firstCard = el;
                return;
            }

            secondCard = el;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);

            let f = firstCard; let s = secondCard;
            setTimeout(() => {
                f.classList.add('matched');
                s.classList.add('matched');
            }, 600);

            resetBoard();

            matches++;
            if (matches === 4) {
                setTimeout(() => {
                    document.getElementById('winScreen').style.display = 'flex';
                    awardPoints();
                }, 1000);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        function awardPoints() {
            let activeId = localStorage.getItem('QRIO_active_id');
            if (activeId) {
                fetch('/api/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: activeId, pointsToAdd: 50 })
                }).catch(console.error);
            }
        }

        render();
    </script>
</body>

</html>
