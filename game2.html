<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qrio Math Burst - Ultra Edition</title>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #facc15;
            --cyber: #00f2ff;
            --bg: #020617;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            color: white;
            user-select: none;
        }

        #bgCanvas { position: fixed; inset: 0; z-index: -1; }
        .input_video { display: none; }
        #output_canvas {
            display: block; width: 100vw; height: 100vh;
            position: absolute; top: 0; left: 0; z-index: 1;
        }

        .vignette {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(0, 242, 255, 0.1) 100%);
            z-index: 2; pointer-events: none;
        }

        .overlay {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(15px);
            transition: 0.5s ease;
        }

        .overlay.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 0 50px rgba(139, 92, 246, 0.2);
            max-width: 600px;
            width: 90%;
        }

        .title {
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(45deg, var(--cyber), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .hand-selector {
            display: flex; gap: 15px; justify-content: center; margin: 35px 0;
        }

        .hand-btn {
            flex: 1; padding: 20px 10px; border-radius: 25px;
            border: 2px solid var(--glass-border);
            background: rgba(255,255,255,0.03);
            color: white; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 700; font-size: 0.8rem;
        }

        .hand-btn i { font-size: 1.8rem; display: block; margin-bottom: 8px; opacity: 0.6; }
        .hand-btn.active {
            border-color: var(--cyber);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
            transform: scale(1.05);
        }
        .hand-btn.active i { opacity: 1; color: var(--cyber); }

        .btn-start {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white; border: none;
            padding: 22px 70px; border-radius: 60px;
            font-size: 1.6rem; font-weight: 900;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4);
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-start:hover { transform: translateY(-5px); box-shadow: 0 20px 45px rgba(236, 72, 153, 0.5); }

        .hud {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 30px; display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 500; pointer-events: none;
        }

        .hud-card {
            background: rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 35px; border-radius: 25px;
            display: flex; gap: 40px; pointer-events: all;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stat-val { font-size: 2rem; font-weight: 900; color: var(--accent); display: block; line-height: 1; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #64748b; font-weight: 700; margin-bottom: 5px; display: block; }

        .btn-round {
            width: 65px; height: 65px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; cursor: pointer; pointer-events: all;
            transition: 0.4s;
        }
        .btn-round:hover { background: #ef4444; border-color: #ef4444; transform: scale(1.1) rotate(-15deg); }

        .target-box {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95); border-radius: 40px; padding: 20px 60px;
            color: #0f172a; text-align: center; z-index: 600;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        #targetEq { font-size: 4rem; font-weight: 950; margin: 0; line-height: 1; }
        .target-label { font-size: 0.85rem; font-weight: 800; color: var(--primary); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }

        #feedback {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 8rem; font-weight: 900; z-index: 1000; opacity: 0;
            -webkit-text-stroke: 4px white; color: transparent;
        }

        #loader {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .target-box { width: 85%; padding: 15px; }
            #targetEq { font-size: 2.5rem; }
            .hud-card { gap: 20px; padding: 10px 20px; }
            .stat-val { font-size: 1.4rem; }
            .hand-selector { flex-wrap: wrap; }
            .hand-btn { flex: unset; width: 45%; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    <div class="vignette"></div>
    <video class="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <div id="loader">
        <div style="width:100px; height:100px; border:10px solid #1e293b; border-top-color:var(--cyber); border-radius:50%; animation:spin 1s linear infinite; box-shadow: 0 0 30px rgba(0,242,255,0.3);"></div>
        <h2 style="margin-top:30px; letter-spacing:4px; font-weight:900; color:var(--cyber);">SYNCING NEURAL LINK...</h2>
    </div>

    <div id="menuOverlay" class="overlay hidden">
        <div class="game-card">
            <h1 class="title">MATH BURST</h1>
            <p style="opacity:0.6; font-size: 1.1rem;">Choose your tracking mode.</p>
            
            <div class="hand-selector">
                <button class="hand-btn" id="btnLeft" onclick="selectHand('Left')">
                    <i class="fa-solid fa-hand"></i>
                    <span>LEFT HAND</span>
                </button>
                <button class="hand-btn active" id="btnBoth" onclick="selectHand('Both')">
                    <i class="fa-solid fa-hands"></i>
                    <span>BOTH HANDS</span>
                </button>
                <button class="hand-btn" id="btnRight" onclick="selectHand('Right')">
                    <i class="fa-solid fa-hand" style="transform: scaleX(-1);"></i>
                    <span>RIGHT HAND</span>
                </button>
            </div>

            <button class="btn-start" onclick="startGame()">INITIATE PHASE</button>
        </div>
    </div>

    <div class="hud">
        <a href="index.html" class="btn-round"><i class="fa-solid fa-house"></i></a>
        <div class="hud-card">
            <div class="stat">
                <span class="stat-label">Neural Score</span>
                <span class="stat-val" id="score">0000</span>
            </div>
            <div class="stat">
                <span class="stat-label">Integrity</span>
                <span class="stat-val" id="timer">60</span>
            </div>
        </div>
        <div style="width:65px;"></div>
    </div>

    <div class="target-box">
        <div class="target-label">OBJECTIVE</div>
        <div id="targetEq">...</div>
    </div>

    <div id="feedback">BOOM!</div>

    <script>
        // --- Globals ---
        let renderer, scene, camera, meshGroup;
        
        // --- Variables ---
        let selectedHandSide = 'Both'; 
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let curProblem = { eq: "", ans: 0 };
        let particles = [];
        let bubbles = [];
        let handPosL = { x: -500, y: -500, active: false };
        let handPosR = { x: -500, y: -500, active: false };
        let frameCount = 0;

        // --- Physics ---
        const Engine = Matter.Engine, World = Matter.World, Bodies = Matter.Bodies;
        const engine = Engine.create();
        engine.world.gravity.y = 0; 
        
        const canvasOut = document.getElementById('output_canvas');
        const ctx = canvasOut.getContext('2d');

        function resize() {
            canvasOut.width = window.innerWidth;
            canvasOut.height = window.innerHeight;
            if(renderer) renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Three.js Background ---
        function init3DBG() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 2000);
            camera.position.z = 600;
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bgCanvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            meshGroup = new THREE.Group();
            const geometry = new THREE.IcosahedronGeometry(10, 0);
            for(let i=0; i<150; i++) {
                const material = new THREE.MeshBasicMaterial({ color: i % 3 === 0 ? 0x00f2ff : 0xec4899, wireframe: true, transparent: true, opacity: 0.15 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
                mesh.scale.setScalar(Math.random()*15 + 5);
                meshGroup.add(mesh);
            }
            scene.add(meshGroup);

            function animate3D() {
                requestAnimationFrame(animate3D);
                meshGroup.rotation.y += 0.0004;
                renderer.render(scene, camera);
            }
            animate3D();
        }
        init3DBG();

        // --- Selection ---
        function selectHand(side) {
            selectedHandSide = side;
            document.getElementById('btnLeft').classList.toggle('active', side === 'Left');
            document.getElementById('btnRight').classList.toggle('active', side === 'Right');
            document.getElementById('btnBoth').classList.toggle('active', side === 'Both');
        }

        function startGame() {
            document.getElementById('menuOverlay').classList.add('hidden');
            score = 0; timeLeft = 60; gameActive = true;
            bubbles = []; World.clear(engine.world);
            newProblem();
            startTimer();
            gameLoop();
        }

        function newProblem() {
            const a = Math.floor(Math.random()*12) + 1;
            const b = Math.floor(Math.random()*12) + 1;
            curProblem = { eq: `${a} + ${b}`, ans: a + b };
            document.getElementById('targetEq').innerText = curProblem.eq;
            gsap.from('#targetEq', { y: 20, opacity: 0, duration: 0.5 });
            spawnBubbles(curProblem.ans);
        }

        function spawnBubbles(correct) {
            bubbles.forEach(b => World.remove(engine.world, b.body));
            bubbles = [];
            
            let choices = [correct];
            while(choices.length < 4) {
                let wrong = correct + Math.floor(Math.random() * 20) - 10;
                if(wrong > 0 && !choices.includes(wrong) && wrong !== correct) choices.push(wrong);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach((val, i) => {
                const r = 70 + Math.random() * 20;
                const x = (window.innerWidth / 5) * (i + 1) + (Math.random()-0.5)*150;
                const y = window.innerHeight + 200 + (i * 120);
                
                const body = Bodies.circle(x, y, r, { frictionAir: 0.01, restitution: 0.95 });
                bubbles.push({
                    body, val, radius: r,
                    color: val === correct ? '#00f2ff' : '#ec4899',
                    swayOffset: Math.random() * Math.PI * 2,
                    speed: 2.2 + Math.random() * 1.5, // MEDIUM SPEED
                    popped: false
                });
                World.add(engine.world, body);
            });
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<25; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15,
                    life: 1.0, size: Math.random()*8 + 2, color
                });
            }
        }

        function gameLoop() {
            if(!gameActive) return;
            frameCount++;
            Engine.update(engine);
            ctx.clearRect(0, 0, canvasOut.width, canvasOut.height);
            
            // Mirror Underlay (Lighter & Vibrant)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.translate(-canvasOut.width, 0);
            
            // Photo Camera Effect: Brightness & Contrast Boost
            ctx.filter = 'brightness(1.2) contrast(1.1) saturate(1.2)';
            ctx.globalAlpha = 0.85; // Way more visible photogenic background
            ctx.drawImage(videoElement, 0, 0, canvasOut.width, canvasOut.height);
            ctx.filter = 'none';
            ctx.restore();

            // Bubbles
            bubbles.forEach(b => {
                if(b.popped) return;
                
                const sx = Math.sin(frameCount * 0.04 + b.swayOffset) * 1.5;
                Matter.Body.setPosition(b.body, {
                    x: b.body.position.x + sx,
                    y: b.body.position.y - b.speed
                });

                const { x, y } = b.body.position;
                
                ctx.save();
                ctx.shadowBlur = 40;
                ctx.shadowColor = b.color;
                
                const gradient = ctx.createRadialGradient(x - b.radius*0.3, y - b.radius*0.3, 0, x, y, b.radius);
                gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
                gradient.addColorStop(1, 'rgba(255,255,255,0.05)');

                ctx.beginPath();
                ctx.arc(x, y, b.radius, 0, Math.PI*2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.strokeStyle = b.color;
                ctx.lineWidth = 5;
                ctx.stroke();

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'white';
                ctx.font = '900 45px Outfit';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.val, x, y);
                ctx.restore();

                // Collision Detection with L and R hands
                const checkPop = (hPos) => {
                    if(!hPos.active) return false;
                    const d = Math.hypot(hPos.x - x, hPos.y - y);
                    return d < b.radius + 40; // Increased radius for easier touch
                };

                if(checkPop(handPosL) || checkPop(handPosR)) popBubble(b);

                if(y < -b.radius*2) {
                    Matter.Body.setPosition(b.body, { x: (Math.random()*0.8+0.1)*window.innerWidth, y: window.innerHeight+100 });
                }
            });

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) particles.splice(i, 1);
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            // Hand Pointer Visuals
            const drawPointer = (pos) => {
                if(!pos.active) return;
                ctx.save();
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 25, 0, Math.PI*2);
                ctx.strokeStyle = '#00f2ff';
                ctx.lineWidth = 4;
                ctx.setLineDash([8, 4]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 10, 0, Math.PI*2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.restore();
            };

            drawPointer(handPosL);
            drawPointer(handPosR);

            requestAnimationFrame(gameLoop);
        }

        function popBubble(b) {
            if(b.popped) return;
            b.popped = true;
            World.remove(engine.world, b.body);
            createExplosion(b.body.position.x, b.body.position.y, b.color);
            
            if(b.val === curProblem.ans) {
                score += 150;
                document.getElementById('score').innerText = score.toString().padStart(4, '0');
                showFeedback("SYNCED!", "#00f2ff");
                setTimeout(newProblem, 400);
            } else {
                score = Math.max(0, score - 75);
                document.getElementById('score').innerText = score.toString().padStart(4, '0');
                showFeedback("FAIL!", "#ef4444");
                setTimeout(newProblem, 200);
            }
        }

        function showFeedback(txt, col) {
            const el = document.getElementById('feedback');
            el.innerText = txt;
            el.style.color = col;
            gsap.fromTo(el, { scale: 0, opacity: 0 }, { scale: 1.2, opacity: 1, duration: 0.3, onComplete: () => {
                gsap.to(el, { scale: 2, opacity: 0, duration: 0.3, delay: 0.2 });
            }});
        }

        function startTimer() {
            const timerInt = setInterval(() => {
                if(!gameActive) { clearInterval(timerInt); return; }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) {
                    gameActive = false;
                    alert(`PHASE COMPLETE\nFinal Neural Score: ${score}`);
                    location.reload();
                }
            }, 1000);
        }

        // --- Hand Tracking Dual ---
        const videoElement = document.querySelector('.input_video');
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        
        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(results => {
            if(document.getElementById('loader').style.display !== 'none') {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('menuOverlay').classList.remove('hidden');
            }

            handPosL.active = false;
            handPosR.active = false;

            if (results.multiHandLandmarks && results.multiHandedness) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const label = results.multiHandedness[i].label; // Left/Right
                    const landmarks = results.multiHandLandmarks[i];
                    
                    const x = (1 - landmarks[8].x) * canvasOut.width;
                    const y = landmarks[8].y * canvasOut.height;

                    if (selectedHandSide === 'Both') {
                        if(label === 'Left') { handPosL.x = x; handPosL.y = y; handPosL.active = true; }
                        else { handPosR.x = x; handPosR.y = y; handPosR.active = true; }
                    } else if (label === selectedHandSide) {
                        handPosL.x = x; handPosL.y = y; handPosL.active = true;
                    }
                }
            }
        });

        const mpCamera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 1280, height: 720
        });
        mpCamera.start();

    </script>
</body>
</html>
